<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22252f;
            --border: #2a2d38;
            --text: #e1e4ed;
            --text2: #9ca0b0;
            --accent: #5b8def;
            --accent-hover: #4a7de0;
            --red: #e0556a;
            --red-bg: rgba(224,85,106,0.12);
            --yellow: #e5c07b;
            --yellow-bg: rgba(229,192,123,0.12);
            --green: #8ccf7e;
            --green-bg: rgba(140,207,126,0.12);
            --priority-high: #e0556a;
            --priority-mid: #e5c07b;
            --priority-low: #8ccf7e;
            --radius: 8px;
            --radius-sm: 5px;
            --transition: 0.15s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        .app { max-width:960px; margin:0 auto; padding:24px 16px 60px; }
        .header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid var(--border); }
        .header h1 { font-size:1.4rem; font-weight:700; }
        .header-stats { display:flex; gap:12px; font-size:0.82rem; color:var(--text2); }
        .header-stats span { background:var(--surface2); padding:4px 10px; border-radius:20px; white-space:nowrap; }
        .header-stats .done { color:var(--green); }
        .sync-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:14px; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); font-size:0.8rem; color:var(--text2); }
        .sync-bar .status { margin-left:auto; display:flex; align-items:center; gap:4px; }
        .saved { color:var(--green); }
        .pending { color:var(--yellow); }
        .btn-sm { padding:6px 14px; border-radius:16px; border:1px solid var(--border); background:var(--surface2); color:var(--text); cursor:pointer; font-size:0.78rem; font-family:inherit; transition:var(--transition); white-space:nowrap; }
        .btn-sm:hover { border-color:var(--accent); color:var(--accent); }
        .btn-sm.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
        .filters { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
        .filter-btn { padding:6px 12px; border-radius:20px; font-size:0.8rem; border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; transition:var(--transition); white-space:nowrap; }
        .filter-btn:hover { border-color:var(--accent); color:var(--text); }
        .filter-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
        .filter-btn.urgent { border-color:var(--red); color:var(--red); }
        .filter-btn.urgent.active { background:var(--red); color:#fff; }
        .block { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; }
        .block-header { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; background:var(--surface2); border-bottom:1px solid transparent; }
        .block.open .block-header { border-bottom-color:var(--border); }
        .block-header:hover { background:#252834; }
        .block-icon { font-size:1rem; }
        .block-title { flex:1; font-weight:600; font-size:0.9rem; display:flex; align-items:center; gap:8px; }
        .block-counter { font-size:0.7rem; color:var(--text2); background:var(--surface); padding:2px 8px; border-radius:12px; }
        .block-arrow { transition:transform 0.2s; font-size:0.65rem; color:var(--text2); }
        .block.open .block-arrow { transform:rotate(90deg); }
        .block-body { display:none; }
        .block.open .block-body { display:block; }
        .task-list { list-style:none; }
        .task-item { display:flex; align-items:flex-start; gap:8px; padding:10px 16px; border-bottom:1px solid var(--border); }
        .task-item:last-child { border-bottom:none; }
        .task-item.completed .task-text { text-decoration:line-through; color:var(--text2); opacity:0.6; }
        .task-item.completed { background:rgba(140,207,126,0.03); }
        .priority-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:6px; }
        .priority-high { background:var(--priority-high); box-shadow:0 0 6px var(--priority-high); }
        .priority-mid { background:var(--priority-mid); box-shadow:0 0 6px var(--priority-mid); }
        .priority-low { background:var(--priority-low); box-shadow:0 0 4px var(--priority-low); }
        .task-check { width:18px; height:18px; border-radius:4px; border:2px solid var(--border); flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:10px; transition:var(--transition); background:transparent; color:transparent; }
        .task-check:hover { border-color:var(--green); }
        .task-item.completed .task-check { background:var(--green); border-color:var(--green); color:#000; }
        .task-content { flex:1; min-width:0; }
        .task-text { font-size:0.85rem; word-break:break-word; }
        .task-meta { font-size:0.7rem; color:var(--text2); margin-top:2px; display:flex; gap:6px; flex-wrap:wrap; }
        .task-meta .tag { background:var(--surface2); padding:1px 6px; border-radius:10px; font-size:0.65rem; }
        .tag.gmail { background:var(--red-bg); color:var(--red); }
        .tag.timeweb { background:var(--yellow-bg); color:var(--yellow); }
        .tag.yandex { background:var(--green-bg); color:var(--green); }
        .task-actions { display:flex; gap:2px; flex-shrink:0; opacity:0; transition:opacity 0.15s; }
        .task-item:hover .task-actions { opacity:1; }
        .btn-icon { width:26px; height:26px; border-radius:var(--radius-sm); border:none; cursor:pointer; font-size:0.75rem; display:flex; align-items:center; justify-content:center; background:transparent; color:var(--text2); }
        .btn-icon:hover { background:var(--surface2); color:var(--text); }
        .btn-icon.del:hover { background:var(--red-bg); color:var(--red); }
        .add-section { margin-top:16px; text-align:center; }
        .btn-add { padding:10px 24px; border-radius:20px; border:1px dashed var(--border); background:transparent; color:var(--text2); cursor:pointer; font-size:0.9rem; font-family:inherit; }
        .btn-add:hover { border-color:var(--accent); color:var(--accent); background:rgba(91,141,239,0.05); }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(3px); }
        .modal { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; width:90%; max-width:460px; max-height:85vh; overflow-y:auto; }
        .modal h3 { margin-bottom:14px; font-size:1rem; }
        .modal label { display:block; font-size:0.75rem; color:var(--text2); margin-bottom:3px; margin-top:10px; }
        .modal input,.modal textarea,.modal select { width:100%; padding:9px 11px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:inherit; font-size:0.85rem; resize:vertical; }
        .modal textarea { min-height:60px; }
        .modal input:focus,.modal textarea:focus,.modal select:focus { outline:none; border-color:var(--accent); }
        .modal-actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }
        .btn { padding:8px 18px; border-radius:var(--radius-sm); border:none; cursor:pointer; font-size:0.85rem; font-family:inherit; }
        .btn-save { background:var(--accent); color:#fff; }
        .btn-save:hover { background:var(--accent-hover); }
        .btn-cancel { background:var(--surface2); color:var(--text); }
        .search-box { width:100%; padding:9px 13px; background:var(--surface); border:1px solid var(--border); border-radius:22px; color:var(--text); font-size:0.85rem; margin-bottom:14px; font-family:inherit; }
        .search-box:focus { outline:none; border-color:var(--accent); }
        .hidden { display:none !important; }
        .user-id { font-size:0.7rem; color:var(--text2); opacity:0.5; padding:2px 10px; background:var(--surface2); border-radius:20px; }
        @media (max-width:600px) { .task-actions { opacity:1; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>📋 Задачник</h1>
            <div class="header-stats">
                <span class="done" id="statDone">✅ 0</span>
                <span class="total" id="statTotal">📌 0</span>
                <span id="statUrgent" style="color:var(--red)">🔴 0</span>
                <span class="user-id" id="userIdDisplay">⏳</span>
            </div>
        </div>
        <div class="sync-bar">
            <span>☁️ Supabase</span>
            <span class="status" id="syncStatus"><span class="saved">● сохранено</span></span>
            <button class="btn-sm primary" id="btnExport">📥 JSON</button>
            <button class="btn-sm" id="btnImport">📤 JSON</button>
            <button class="btn-sm" id="btnReset">🔄 Сброс</button>
        </div>
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск...">
        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="done">Выполненные</button>
            <button class="filter-btn urgent" data-filter="urgent">🔴 Срочные</button>
        </div>
        <div id="taskContainer"></div>
        <div class="add-section"><button class="btn-add" id="btnAddTask">+ Добавить задачу</button></div>
        <input type="file" id="fileInput" accept=".json" style="display:none;">
    </div>
    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">Новая задача</h3>
            <label>Блок</label>
            <select id="modalBlock">
                <option value="0">Блок 0 — Срочное</option>
                <option value="1">Блок 1 — Пароли и почта</option>
                <option value="2">Блок 2 — Платежи и финансы</option>
                <option value="3">Блок 3 — МойСклад и номенклатура</option>
            </select>
            <label>Задача</label><textarea id="modalText" placeholder="Текст задачи..."></textarea>
            <label>Приоритет</label>
            <select id="modalPriority">
                <option value="high">🔴 Высокий</option>
                <option value="mid" selected>🟡 Средний</option>
                <option value="low">🟢 Низкий</option>
            </select>
            <label>Теги</label><input type="text" id="modalTags" placeholder="gmail, timeweb...">
            <div class="modal-actions">
                <button class="btn btn-cancel" id="btnModalCancel">Отмена</button>
                <button class="btn btn-save" id="btnModalSave">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            // 1. КОНФИГУРАЦИЯ SUPABASE
            // ============================================================
            var SUPABASE_URL = 'https://lzwbdobhodwdmjzcmdjs.supabase.co';
            var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6d2Jkb2Job2R3ZG1qemNtZGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNTExNDksImV4cCI6MjA5OTgyNzE0OX0.tpAB7yZZH3S7MH6_EvNGWe5erJDNdZLnG0CgYDmmzRw';
            var supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // ============================================================
            // 2. TELEGRAM WEB APP
            // ============================================================
            var tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            
            // Получаем ID пользователя (как в примере с CloudStorage)
            var user = tg.initDataUnsafe?.user;
            var userId = user ? String(user.id) : null;
            
            // Показываем ID пользователя
            var userIdDisplay = document.getElementById('userIdDisplay');
            if (userId) {
                userIdDisplay.textContent = '👤 ' + userId;
            } else {
                userIdDisplay.textContent = '👤 тестовый';
                userId = 'test_user_' + Date.now(); // Для тестирования без Telegram
            }
            
            // ============================================================
            // 3. ДАННЫЕ
            // ============================================================
            var TABLE_NAME = 'tasks';
            var tasks = [];
            var currentFilter = 'all';
            var searchQuery = '';
            var editingId = null;
            
            // Дефолтные задачи (как в примере)
            var defaultTasks = [
                {"id":"demo-1","block":"0","text":"Пример срочной задачи — проверить оплату хостинга до 20 числа","priority":"high","tags":["хостинг","срочно"],"done":false},
                {"id":"demo-2","block":"1","text":"Пример задачи по почте — создать ящик info@company.ru","priority":"mid","tags":["почта","yandex"],"done":false},
                {"id":"demo-3","block":"3","text":"Пример задачи по складу — обновить остатки после инвентаризации","priority":"low","tags":["склад"],"done":true}
            ];

            var blockDefs = {
                '0':{title:'⚡ Блок 0 — Срочное',icon:'🔴'},
                '1':{title:'🔐 Блок 1 — Пароли и почта',icon:'🔑'},
                '2':{title:'💰 Блок 2 — Платежи и финансы',icon:'💳'},
                '3':{title:'📦 Блок 3 — МойСклад и номенклатура',icon:'📊'}
            };

            // ============================================================
            // 4. UI ЭЛЕМЕНТЫ
            // ============================================================
            var container = document.getElementById('taskContainer');
            var modalOverlay = document.getElementById('modalOverlay');
            var modalTitle = document.getElementById('modalTitle');
            var modalBlock = document.getElementById('modalBlock');
            var modalText = document.getElementById('modalText');
            var modalPriority = document.getElementById('modalPriority');
            var modalTags = document.getElementById('modalTags');
            var syncStatus = document.getElementById('syncStatus');
            var fileInput = document.getElementById('fileInput');
            var searchInput = document.getElementById('searchInput');

            // ============================================================
            // 5. СТАТУС СИНХРОНИЗАЦИИ
            // ============================================================
            function setSyncStatus(text, cls) {
                syncStatus.innerHTML = '<span class="' + cls + '">' + text + '</span>';
            }

            // ============================================================
            // 6. ЗАГРУЗКА ЗАДАЧ ИЗ SUPABASE (аналог CloudStorage.getItem)
            // ============================================================
            async function loadTasks() {
                setSyncStatus('⏳ загрузка...', 'pending');
                
                try {
                    var { data, error } = await supabase
                        .from(TABLE_NAME)
                        .select('*')
                        .eq('telegram_id', userId);
                    
                    if (error) throw error;
                    
                    if (!data || data.length === 0) {
                        // Нет задач — создаём дефолтные
                        tasks = JSON.parse(JSON.stringify(defaultTasks));
                        await saveTasks();
                    } else {
                        tasks = data.map(function(t) {
                            return {
                                id: t.id,
                                block: t.block,
                                text: t.text,
                                priority: t.priority || 'mid',
                                tags: t.tags || [],
                                done: t.done || false
                            };
                        });
                    }
                    
                    render();
                    setSyncStatus('● сохранено', 'saved');
                    
                } catch (err) {
                    console.error('Ошибка загрузки:', err);
                    tasks = JSON.parse(JSON.stringify(defaultTasks));
                    render();
                    setSyncStatus('⚠ ошибка', 'pending');
                }
            }

            // ============================================================
            // 7. СОХРАНЕНИЕ ЗАДАЧ В SUPABASE (аналог CloudStorage.setItem)
            // ============================================================
            async function saveTasks() {
                setSyncStatus('⏳ синхронизация...', 'pending');
                
                try {
                    // Удаляем старые задачи пользователя
                    await supabase
                        .from(TABLE_NAME)
                        .delete()
                        .eq('telegram_id', userId);
                    
                    // Вставляем новые
                    if (tasks.length > 0) {
                        var tasksToInsert = tasks.map(function(t) {
                            return {
                                id: t.id,
                                telegram_id: userId,
                                block: t.block,
                                text: t.text,
                                priority: t.priority || 'mid',
                                tags: t.tags || [],
                                done: t.done || false
                            };
                        });
                        
                        var { error } = await supabase
                            .from(TABLE_NAME)
                            .insert(tasksToInsert);
                        
                        if (error) throw error;
                    }
                    
                    setSyncStatus('● сохранено', 'saved');
                    
                } catch (err) {
                    console.error('Ошибка сохранения:', err);
                    setSyncStatus('⚠ ошибка', 'pending');
                }
            }

            // ============================================================
            // 8. ОСТАЛЬНЫЕ ФУНКЦИИ (те же что в примере)
            // ============================================================
            function resetToDefaults() {
                if (confirm('Сбросить все задачи к демо-списку?')) {
                    tasks = JSON.parse(JSON.stringify(defaultTasks));
                    saveTasks().then(render);
                }
            }

            function exportToJSON() {
                var blob = new Blob([JSON.stringify(tasks, null, 2)], {type:'application/json'});
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'tasks.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            function importFromJSON(file) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        var data = JSON.parse(e.target.result);
                        if (!Array.isArray(data)) throw new Error('Файл должен содержать массив задач');
                        tasks = data;
                        saveTasks().then(render);
                        setSyncStatus('● импортировано', 'saved');
                    } catch(err) {
                        alert('Ошибка: ' + err.message);
                    }
                };
                reader.readAsText(file);
            }

            function triggerImport() { fileInput.click(); }

            function generateId() {
                return 't-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
            }

            function escapeHtml(s) {
                var d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            // ============================================================
            // 9. ФИЛЬТРАЦИЯ И ОТРИСОВКА
            // ============================================================
            function getFilteredTasks() {
                var f = tasks.slice();
                if (searchQuery.trim()) {
                    var q = searchQuery.toLowerCase().trim();
                    f = f.filter(function(t) {
                        return t.text.toLowerCase().includes(q) ||
                            (t.tags || []).some(function(tg) { return tg.toLowerCase().includes(q); });
                    });
                }
                if (currentFilter === 'active') f = f.filter(function(t) { return !t.done; });
                else if (currentFilter === 'done') f = f.filter(function(t) { return t.done; });
                else if (currentFilter === 'urgent') f = f.filter(function(t) { return t.priority === 'high' && !t.done; });
                return f;
            }

            function render() {
                var filtered = getFilteredTasks();
                var html = '';
                var blockIds = ['0', '1', '2', '3'];
                
                for (var i = 0; i < blockIds.length; i++) {
                    var bid = blockIds[i];
                    var bt = filtered.filter(function(t) { return t.block === bid; });
                    if (bt.length === 0 && currentFilter !== 'all') continue;
                    
                    var def = blockDefs[bid];
                    var doneC = bt.filter(function(t) { return t.done; }).length;
                    
                    html += '<div class="block open" data-block="' + bid + '">';
                    html += '<div class="block-header">';
                    html += '<span class="block-icon">' + def.icon + '</span>';
                    html += '<span class="block-title">' + def.title + ' <span class="block-counter">' + doneC + '/' + bt.length + '</span></span>';
                    html += '<span class="block-arrow">▶</span>';
                    html += '</div>';
                    html += '<div class="block-body"><ul class="task-list">';
                    
                    for (var j = 0; j < bt.length; j++) {
                        html += renderTask(bt[j]);
                    }
                    
                    html += '</ul></div></div>';
                }
                
                container.innerHTML = html || '<div style="text-align:center;padding:40px;color:var(--text2)">Нет задач</div>';
                
                document.getElementById('statDone').textContent = '✅ ' + tasks.filter(function(t) { return t.done; }).length;
                document.getElementById('statTotal').textContent = '📌 ' + tasks.length;
                document.getElementById('statUrgent').textContent = '🔴 ' + tasks.filter(function(t) { return t.priority === 'high' && !t.done; }).length;
                
                bindEvents();
            }

            function renderTask(t) {
                var pl = {high:'🔴 Высокий', mid:'🟡 Средний', low:'🟢 Низкий'}[t.priority] || '';
                var tagsHtml = (t.tags || []).map(function(tag) {
                    var cls = '';
                    if (['gmail', 'google'].indexOf(tag.toLowerCase()) !== -1) cls = 'gmail';
                    else if (['timeweb'].indexOf(tag.toLowerCase()) !== -1) cls = 'timeweb';
                    else if (['yandex', 'яндекс'].indexOf(tag.toLowerCase()) !== -1) cls = 'yandex';
                    return '<span class="tag ' + cls + '">' + tag + '</span>';
                }).join('');
                
                return '<li class="task-item ' + (t.done ? 'completed' : '') + '" data-id="' + t.id + '">' +
                    '<div class="priority-dot priority-' + t.priority + '"></div>' +
                    '<div class="task-check" data-action="toggle" data-id="' + t.id + '">✓</div>' +
                    '<div class="task-content">' +
                        '<div class="task-text">' + escapeHtml(t.text) + '</div>' +
                        '<div class="task-meta">' + tagsHtml + ' ' + pl + '</div>' +
                    '</div>' +
                    '<div class="task-actions">' +
                        '<button class="btn-icon" data-action="edit" data-id="' + t.id + '">✎</button>' +
                        '<button class="btn-icon del" data-action="delete" data-id="' + t.id + '">✕</button>' +
                    '</div>' +
                '</li>';
            }

            // ============================================================
            // 10. ОБРАБОТЧИКИ СОБЫТИЙ
            // ============================================================
            function bindEvents() {
                document.querySelectorAll('.block-header').forEach(function(h) {
                    h.addEventListener('click', function() {
                        this.closest('.block').classList.toggle('open');
                    });
                });
                
                document.querySelectorAll('[data-action]').forEach(function(el) {
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var a = this.dataset.action;
                        var id = this.dataset.id;
                        if (a === 'toggle') toggleTask(id);
                        if (a === 'edit') openEditModal(id);
                        if (a === 'delete') deleteTask(id);
                    });
                });
            }

            function toggleTask(id) {
                for (var i = 0; i < tasks.length; i++) {
                    if (tasks[i].id === id) {
                        tasks[i].done = !tasks[i].done;
                        break;
                    }
                }
                saveTasks().then(render);
            }

            function deleteTask(id) {
                if (confirm('Удалить задачу?')) {
                    tasks = tasks.filter(function(t) { return t.id !== id; });
                    saveTasks().then(render);
                }
            }

            function openAddModal() {
                editingId = null;
                modalTitle.textContent = 'Новая задача';
                modalBlock.value = '0';
                modalText.value = '';
                modalPriority.value = 'mid';
                modalTags.value = '';
                modalOverlay.classList.remove('hidden');
                modalText.focus();
            }

            function openEditModal(id) {
                var t = null;
                for (var i = 0; i < tasks.length; i++) {
                    if (tasks[i].id === id) { t = tasks[i]; break; }
                }
                if (!t) return;
                editingId = id;
                modalTitle.textContent = 'Редактировать';
                modalBlock.value = t.block;
                modalText.value = t.text;
                modalPriority.value = t.priority;
                modalTags.value = (t.tags || []).join(', ');
                modalOverlay.classList.remove('hidden');
                modalText.focus();
            }

            function closeModal() {
                modalOverlay.classList.add('hidden');
                editingId = null;
            }

            function saveModal() {
                var text = modalText.value.trim();
                if (!text) return;
                
                var data = {
                    block: modalBlock.value,
                    text: text,
                    priority: modalPriority.value,
                    tags: modalTags.value.split(',').map(function(s) { return s.trim(); }).filter(Boolean)
                };
                
                if (editingId) {
                    for (var i = 0; i < tasks.length; i++) {
                        if (tasks[i].id === editingId) {
                            tasks[i].block = data.block;
                            tasks[i].text = data.text;
                            tasks[i].priority = data.priority;
                            tasks[i].tags = data.tags;
                            break;
                        }
                    }
                } else {
                    tasks.unshift({
                        id: generateId(),
                        done: false,
                        block: data.block,
                        text: data.text,
                        priority: data.priority,
                        tags: data.tags
                    });
                }
                
                saveTasks().then(render);
                closeModal();
            }

            // ============================================================
            // 11. ПОДКЛЮЧЕНИЕ СОБЫТИЙ
            // ============================================================
            document.getElementById('filters').addEventListener('click', function(e) {
                if (e.target.classList.contains('filter-btn')) {
                    document.querySelectorAll('.filter-btn').forEach(function(b) {
                        b.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    render();
                }
            });

            searchInput.addEventListener('input', function() {
                searchQuery = this.value;
                render();
            });

            document.getElementById('btnAddTask').addEventListener('click', openAddModal);
            document.getElementById('btnModalCancel').addEventListener('click', closeModal);
            document.getElementById('btnModalSave').addEventListener('click', saveModal);
            document.getElementById('btnExport').addEventListener('click', exportToJSON);
            document.getElementById('btnImport').addEventListener('click', triggerImport);
            document.getElementById('btnReset').addEventListener('click', resetToDefaults);

            fileInput.addEventListener('change', function() {
                if (this.files.length > 0) {
                    importFromJSON(this.files[0]);
                    this.value = '';
                }
            });

            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) closeModal();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && !modalOverlay.classList.contains('hidden')) closeModal();
            });

            // ============================================================
            // 12. ЗАПУСК
            // ============================================================
            loadTasks();
        })();
    </script>
</body>
</html>
