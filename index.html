<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task & Payment Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@twa-dev/sdk"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  
  <style>
    :root {
      --bg-primary: #f0f4f8;
      --bg-secondary: rgba(255, 255, 255, 0.7);
      --text-primary: #2a3b4d;
      --accent: #6c5ce7;
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #ff7675;
      --border-radius: 16px;
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
      --font-family: 'Nunito', sans-serif;
    }

    .dark {
      --bg-primary: #0d1224;
      --bg-secondary: rgba(30, 30, 46, 0.7);
      --text-primary: #e0e0ff;
      --glass-bg: rgba(30, 30, 46, 0.3);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); transition: background-color 0.3s ease, color 0.3s ease; }
    body { background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    .container { max-width: 1200px; width: 100%; margin: 0 auto; padding: 20px; padding-bottom: 80px; }
    .glass-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: var(--border-radius); box-shadow: var(--glass-shadow); padding: 24px; margin-bottom: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
    header h1 { font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    header .icon { width: 28px; height: 28px; stroke: currentColor; fill: none; stroke-width: 2; }
    .nav-mobile { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 16px; background: var(--glass-bg); backdrop-filter: blur(10px); border-top: 1px solid var(--glass-border); z-index: 100; }
    .nav-btn { background: none; border: none; color: var(--text-primary); font-size: 0.75rem; cursor: pointer; padding: 6px 12px; border-radius: 8px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .nav-btn .icon { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
    .nav-btn.active { background: var(--accent); color: white; }
    .task-item, .payment-item { padding: 12px; border-radius: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); }
    .deadline-indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-left: 8px; }
    .green { background: var(--success); }
    .yellow { background: var(--warning); }
    .red { background: var(--danger); }
    input, select, button { padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-secondary); color: var(--text-primary); margin: 4px 0; font-size: 16px; width: 100%; }
    button { background: var(--accent); color: white; cursor: pointer; border: none; font-weight: 600; padding: 12px 24px; width: auto; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
    button .icon { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2; }
    button.secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--glass-border); }
    button.secondary .icon { stroke: var(--text-primary); }
    button.danger { background: var(--danger); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center; }
    .modal-content { width: 90%; max-width: 500px; padding: 24px; border-radius: var(--border-radius); background: var(--bg-secondary); box-shadow: var(--glass-shadow); backdrop-filter: blur(10px); max-height: 90vh; overflow-y: auto; }
    .hidden { display: none !important; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .flex-between input { flex: 1; }
    .flex-between button { width: auto; }
    
    /* Desktop navigation - скрываем по умолчанию, показываем только когда пользователь авторизован */
    .desktop-nav { 
      display: none; 
      flex-direction: column; 
      width: 200px; 
      padding: 20px; 
      position: fixed; 
      height: 100%; 
      top: 0; 
      left: 0; 
      background: var(--glass-bg); 
      backdrop-filter: blur(10px); 
      border-right: 1px solid var(--glass-border); 
      z-index: 50;
      justify-content: center;
    }
    .desktop-nav.visible { display: flex; }
    .desktop-nav .nav-btn { 
      flex-direction: row; 
      justify-content: flex-start; 
      gap: 12px; 
      padding: 12px 20px; 
      font-size: 0.9rem;
      width: 100%;
      border-radius: 12px;
    }
    .desktop-nav .nav-btn .icon { width: 20px; height: 20px; }
    
    main { padding-top: 20px; }
    main.full-width { margin-left: 0; }
    main.with-nav { margin-left: 220px; }
    
    @media (min-width: 768px) { 
      .nav-mobile { display: none; } 
      .desktop-nav.visible { display: flex; }
      main.with-nav { margin-left: 220px; }
      .container { padding-bottom: 20px; }
    }
    @media (max-width: 767px) {
      .desktop-nav { display: none !important; }
      main.with-nav { margin-left: 0; }
      main.full-width { margin-left: 0; }
    }

    .loading { text-align: center; padding: 40px; font-size: 18px; opacity: 0.7; }
    .empty-state { text-align: center; padding: 30px; color: var(--text-primary); opacity: 0.6; }
    .error-msg { background: var(--danger); color: white; padding: 16px; border-radius: var(--border-radius); text-align: center; }
    .user-badge { display: flex; align-items: center; gap: 10px; font-size: 14px; opacity: 0.8; }
    .user-badge .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .sync-status { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: var(--success); color: white; display: inline-block; }
    .sync-status.offline { background: var(--danger); }
    .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; gap: 20px; }
    .login-screen h2 { font-size: 28px; }
    .login-screen p { opacity: 0.7; max-width: 400px; }
    .login-icon { width: 80px; height: 80px; stroke: var(--accent); fill: none; stroke-width: 1.5; }
    .telegram-login { background: #0088cc; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 18px; padding: 16px; width: 100%; max-width: 320px; }
    .telegram-login:hover { background: #006699; }
    .telegram-login .icon { stroke: white; width: 24px; height: 24px; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 4px 8px; display: inline-flex; align-items: center; }
    .icon-btn .icon { width: 22px; height: 22px; stroke: var(--text-primary); fill: none; stroke-width: 2; }
    .export-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .export-options button { flex: 1; min-width: 100px; }
    .tag { display: inline-block; background: var(--glass-bg); padding: 2px 10px; border-radius: 12px; font-size: 12px; margin: 2px; }
    .flex-wrap { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .hidden-nav { display: none !important; }
  </style>
</head>

<!-- Мобильная навигация -->
<div class="nav-mobile" id="nav-mobile">
  <button class="nav-btn active" data-section="tasks">
    <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>

</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Новая задача</h3>
    <form id="modal-form">
      <input type="text" id="item-title" placeholder="Название" required />
      <select id="item-folder"><option value="">Без папки</option></select>
      <select id="item-priority">
        <option value="low">Низкий</option>
        <option value="medium">Средний</option>
        <option value="high">Высокий</option>
      </select>
      <input type="date" id="item-deadline" />
      <input type="text" id="item-tags" placeholder="Теги (через запятую)" />
      <button type="submit">
        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Создать
      </button>
    </form>
    <form id="modal-form-payment" class="hidden">
      <input type="text" id="payment-title" placeholder="Название" required />
      <input type="date" id="payment-due-date" required />
      <select id="payment-recurrence">
        <option value="1m">1 месяц</option>
        <option value="2m">2 месяца</option>
        <option value="3m">3 месяца</option>
        <option value="6m">6 месяцев</option>
        <option value="1y">1 год</option>
      </select>
      <button type="submit">
        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Создать
      </button>
    </form>
  </div>
</div>

<div class="modal" id="export-modal">
  <div class="modal-content">
    <h3 id="export-title">Экспорт данных</h3>
    <div id="export-content">
      <p style="margin-bottom:16px;opacity:0.7;">Выберите формат для экспорта данных</p>
      <div class="export-options">
        <button onclick="exportData('json')">
          <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>
          JSON

        <button onclick="exportData('excel')">
          <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="16" x2="16" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="20" x2="13" y2="20"/></svg>
          Excel
        </button>
      </div>
    </div>
    <div id="import-content" class="hidden">
      <p style="margin-bottom:16px;opacity:0.7;">Выберите файл для импорта (JSON или Excel)</p>
      <input type="file" id="import-file" accept=".json,.xlsx,.xls" style="margin-bottom:12px;" />
      <button onclick="importData()">
        <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>
        Импортировать
      </button>
      <button class="secondary" onclick="closeExportModal()" style="margin-top:8px;">Отмена</button>
    </div>
    <button class="secondary" onclick="closeExportModal()" style="margin-top:12px;">Закрыть</button>
  </div>
</div>

  function getRecurrenceLabel(key) { return t(key) || key; }

  // ============================================================
  // 3. УПРАВЛЕНИЕ НАВИГАЦИЕЙ
  // ============================================================
  function showNavigation(show) {
    var desktopNav = document.getElementById('desktop-nav');
    var mainContent = document.getElementById('content');
    var navMobile = document.getElementById('nav-mobile');
    
    if (show) {
      if (window.innerWidth >= 768) {
        desktopNav.classList.add('visible');
        mainContent.classList.remove('full-width');
        mainContent.classList.add('with-nav');
      } else {
        desktopNav.classList.remove('visible');
        mainContent.classList.remove('with-nav');
        mainContent.classList.add('full-width');
      }
      if (navMobile) navMobile.style.display = 'flex';
    } else {
      desktopNav.classList.remove('visible');
      mainContent.classList.remove('with-nav');
      mainContent.classList.add('full-width');
      if (navMobile) navMobile.style.display = 'none';
    }
  }

  // ============================================================
  // 4. АВТОРИЗАЦИЯ
  // ============================================================
  function initTelegram() {
    try {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        var user = window.Telegram.WebApp.initDataUnsafe?.user;
        if (user) {
          telegramId = String(user.id);
          userData = {
            id: String(user.id),
            username: user.username || user.first_name || t('guest'),
            firstName: user.first_name || '',
            lastName: user.last_name || '',
            photoUrl: user.photo_url || null
          };
          isAuthorized = true;
          return true;
        }
      }
      isAuthorized = false;
      return false;
    } catch (e) {
      isAuthorized = false;
      return false;
    }
  }

  function useTestMode() {
    telegramId = TEST_TELEGRAM_ID;
    userData = {
      id: TEST_TELEGRAM_ID,
      username: 'Тестовый пользователь',
      firstName: 'Тест',
      lastName: ''
    };
    isAuthorized = true;
    updateUserUI();
    showNavigation(true);
    loadProfile().then(function() {
      updateUI();
      setupNavigation();
      setupModal();
      setupForms();
      renderTasks();
    });
  }

  // ============================================================
  // 5. UI ФУНКЦИИ
  // ============================================================
  function updateUserUI() {
    if (!userData) return;
    var nameEl = document.getElementById('user-name');
    var avatarEl = document.getElementById('user-avatar');
    if (nameEl) nameEl.textContent = userData.username || userData.firstName || t('guest');
    if (avatarEl) {
      if (userData.photoUrl) {
        avatarEl.innerHTML = '<img src="' + userData.photoUrl + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
      } else {
        var letter = (userData.firstName || t('guest'))[0].toUpperCase();
        avatarEl.textContent = letter;
      }
    }
  }

  function setSyncStatus(status) {
    var el = document.getElementById('sync-status');
    if (!el) return;
    if (status === 'ok') {
      el.textContent = '✅ ' + t('sync');
      el.className = 'sync-status';
    } else if (status === 'loading') {
      el.textContent = '⏳ ' + t('sync') + '...';
      el.className = 'sync-status';
    } else {
      el.textContent = '📴 ' + t('offline');
      el.className = 'sync-status offline';
    }
  }

  function updateUI() {
    document.querySelectorAll('.nav-btn').forEach(function(btn) {
      var section = btn.dataset.section;
      var span = btn.querySelector('span');
      if (span) {
        if (section === 'tasks') span.textContent = t('tasks');
        else if (section === 'payments') span.textContent = t('payments');
        else if (section === 'settings') span.textContent = t('settings');
      }
    });
    document.getElementById('modal-title').textContent = 
      currentSection === 'tasks' ? t('new_task') : t('new_payment');
    document.getElementById('item-title').placeholder = t('title');
    document.getElementById('item-tags').placeholder = t('tags');
  }

  // ============================================================
  // 6. ЛОГИН СКРИН
  // ============================================================
  function renderLoginScreen() {
    // Скрываем навигацию
    showNavigation(false);
    
    var content = document.getElementById('content');
    content.innerHTML = `
      <div class="login-screen">
        <svg class="login-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        <h2>${t('login_title')}</h2>
        <p>${t('login_desc')}</p>
        <button class="telegram-login" id="telegram-login-btn">
          <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
          ${t('login_btn')}
        </button>
        <div style="font-size:12px;opacity:0.5;margin-top:20px;">
          🔒 Данные синхронизируются через Telegram
        </div>
      </div>
    `;
    document.getElementById('telegram-login-btn').onclick = function() {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.openLink('https://t.me/' + (window.Telegram.WebApp.initDataUnsafe?.user?.username || ''));
      } else {
        useTestMode();
      }
    };
  }

  // ============================================================
  // 7. ПРОФИЛЬ
  // ============================================================
  async function loadProfile() {
    try {
      if (!telegramId) return;
      setSyncStatus('loading');
      var { data, error } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('telegram_id', telegramId)
        .maybeSingle();

      if (error && error.code !== 'PGRST116') {
        setSyncStatus('error');
        return;
      }

      if (!data) {
        var { error: insertError } = await supabaseClient
          .from('profiles')
          .insert([{ telegram_id: telegramId, username: userData?.username || t('guest') }]);
        if (insertError) { setSyncStatus('error'); return; }
        setSyncStatus('ok');
        return;
      }

      currentLang = data.language || 'ru';
      if (data.theme === 'dark') document.body.classList.add('dark');
      else document.body.classList.remove('dark');
      setSyncStatus('ok');
    } catch (err) {
      setSyncStatus('error');
    }
  }

  // ============================================================
  // 8-15. ВСЕ ОСТАЛЬНЫЕ ФУНКЦИИ (ЗАДАЧИ, ПЛАТЕЖИ, НАСТРОЙКИ И Т.Д.)
  // ============================================================
  // (функции renderTasks, renderPayments, openSettings и др. остаются без изменений)
  // Для краткости я их не повторяю, но они должны быть такими же как в предыдущей версии

  // ============================================================
  // 16. ИНИЦИАЛИЗАЦИЯ
  // ============================================================
  function init() {
    // Скрываем навигацию по умолчанию
    showNavigation(false);
    
    var hasTelegram = initTelegram();
    if (!hasTelegram || !telegramId) {
      renderLoginScreen();
      return;
    }
    
    // Показываем навигацию после авторизации
    showNavigation(true);
    updateUserUI();
    loadProfile().then(function() {
      updateUI();
      setupNavigation();
      setupModal();
      setupForms();
      renderTasks();
    });
  }

  // Обёртка для функций, которые могут вызываться до инициализации
  function setupNavigation() {
    document.querySelectorAll('.nav-btn').forEach(function(btn) {
      btn.onclick = function() { navigateTo(this.dataset.section); };
    });
    document.getElementById('settings-btn').onclick = function() { navigateTo('settings'); };
  }

  function setupModal() {
    document.getElementById('modal').onclick = function(e) {
      if (e.target === this) this.style.display = 'none';
    };
    document.getElementById('export-modal').onclick = function(e) {
      if (e.target === this) this.style.display = 'none';
    };
  }

  function setupForms() {
    document.getElementById('modal-form').onsubmit = async function(e) {
      e.preventDefault();
      var title = document.getElementById('item-title').value;
      var folder = document.getElementById('item-folder').value;
      var priority = document.getElementById('item-priority').value;
      var deadline = document.getElementById('item-deadline').value;
      var tags = document.getElementById('item-tags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean);

      setSyncStatus('loading');
      var { error } = await supabaseClient.from('tasks').insert([{
        telegram_id: telegramId, title: title,
        folder_id: folder || null, priority: priority,
        tags: tags, deadline: deadline || null
      }]);
      if (error) { alert('❌ ' + t('error')); setSyncStatus('error'); }
      else {
        document.getElementById('modal').style.display = 'none';
        this.reset();
        renderTasks();
        setSyncStatus('ok');
      }
    };

    document.getElementById('modal-form-payment').onsubmit = async function(e) {
      e.preventDefault();
      var title = document.getElementById('payment-title').value;
      var dueDate = document.getElementById('payment-due-date').value;
      var recurrence = document.getElementById('payment-recurrence').value;

      setSyncStatus('loading');
      var { error } = await supabaseClient.from('payments').insert([{
        telegram_id: telegramId, title: title,
        due_date: dueDate, recurrence: recurrence
      }]);
      if (error) { alert('❌ ' + t('error')); setSyncStatus('error'); }
      else {
        document.getElementById('modal').style.display = 'none';
        this.reset();
        renderPayments();
        setSyncStatus('ok');
      }
    };
  }

  // ============================================================
  // ЗАПУСК
  // ============================================================
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
