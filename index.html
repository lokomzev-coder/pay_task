<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task & Payment Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@twa-dev/sdk"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  
  <style>
    :root {
      --bg-primary: #f0f4f8;
      --bg-secondary: rgba(255, 255, 255, 0.7);
      --text-primary: #2a3b4d;
      --accent: #6c5ce7;
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #ff7675;
      --border-radius: 16px;
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
      --font-family: 'Nunito', sans-serif;
    }

    .dark {
      --bg-primary: #0d1224;
      --bg-secondary: rgba(30, 30, 46, 0.7);
      --text-primary: #e0e0ff;
      --glass-bg: rgba(30, 30, 46, 0.3);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); transition: background-color 0.3s ease, color 0.3s ease; }
    body { background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    .container { max-width: 1200px; width: 100%; margin: 0 auto; padding: 20px; padding-bottom: 80px; }
    .glass-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: var(--border-radius); box-shadow: var(--glass-shadow); padding: 24px; margin-bottom: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
    header h1 { font-size: 24px; font-weight: 700; }
    .nav-mobile { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 16px; background: var(--glass-bg); backdrop-filter: blur(10px); border-top: 1px solid var(--glass-border); z-index: 100; }
    .nav-btn { background: none; border: none; color: var(--text-primary); font-size: 1rem; cursor: pointer; padding: 8px 16px; border-radius: 8px; font-weight: 600; }
    .nav-btn.active { background: var(--accent); color: white; }
    .task-item, .payment-item { padding: 12px; border-radius: 12px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); }
    .deadline-indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-left: 8px; }
    .green { background: var(--success); }
    .yellow { background: var(--warning); }
    .red { background: var(--danger); }
    input, select, button { padding: 12px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-secondary); color: var(--text-primary); margin: 4px 0; font-size: 16px; width: 100%; }
    button { background: var(--accent); color: white; cursor: pointer; border: none; font-weight: 600; padding: 12px 24px; width: auto; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center; }
    .modal-content { width: 90%; max-width: 500px; padding: 24px; border-radius: var(--border-radius); background: var(--bg-secondary); box-shadow: var(--glass-shadow); backdrop-filter: blur(10px); max-height: 90vh; overflow-y: auto; }
    .hidden { display: none; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .flex-between input { flex: 1; }
    @media (min-width: 768px) { .nav-mobile { display: none; } .desktop-nav { display: flex; flex-direction: column; width: 200px; padding: 20px; position: fixed; height: 100%; top: 0; left: 0; background: var(--glass-bg); backdrop-filter: blur(10px); border-right: 1px solid var(--glass-border); } main { margin-left: 220px; padding-top: 20px; } .container { padding-bottom: 20px; } }
    .loading { text-align: center; padding: 40px; font-size: 18px; opacity: 0.7; }
    .empty-state { text-align: center; padding: 30px; color: var(--text-primary); opacity: 0.6; }
    .error-msg { background: var(--danger); color: white; padding: 16px; border-radius: var(--border-radius); text-align: center; }
  </style>
</head>
<body class="light">

<div class="container">
  <header id="app-header">
    <h1>📋 Tracker</h1>
    <button id="settings-btn">⚙️</button>
  </header>

  <div class="desktop-nav hidden">
    <button class="nav-btn active" data-section="tasks">📋 ЗАДАЧИ</button>
    <button class="nav-btn" data-section="payments">💰 ПЛАТЕЖИ</button>
    <button class="nav-btn" data-section="settings">⚙️ НАСТРОЙКИ</button>
  </div>

  <main id="content">
    <div class="loading">⏳ Загрузка...</div>
  </main>
</div>

<div class="nav-mobile">
  <button class="nav-btn active" data-section="tasks">📋</button>
  <button class="nav-btn" data-section="payments">💰</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Новая задача</h3>
    <form id="modal-form">
      <input type="text" id="item-title" placeholder="Название" required />
      <select id="item-folder"><option value="">Без папки</option></select>
      <select id="item-priority">
        <option value="low">Низкий</option>
        <option value="medium">Средний</option>
        <option value="high">Высокий</option>
      </select>
      <input type="date" id="item-deadline" />
      <input type="text" id="item-tags" placeholder="Теги (через запятую)" />
      <button type="submit">➕ Создать</button>
    </form>
    <form id="modal-form-payment" class="hidden">
      <input type="text" id="payment-title" placeholder="Название" required />
      <input type="date" id="payment-due-date" required />
      <select id="payment-recurrence">
        <option value="1m">1 месяц</option>
        <option value="2m">2 месяца</option>
        <option value="3m">3 месяца</option>
        <option value="6m">6 месяцев</option>
        <option value="1y">1 год</option>
      </select>
      <button type="submit">➕ Создать</button>
    </form>
  </div>
</div>

<script>
  // --- КОНФИГУРАЦИЯ ---
  var SUPABASE_URL = 'https://lzwbdobhodwdmjzcmdjs.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6d2Jkb2Job2R3ZG1qemNtZGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNTExNDksImV4cCI6MjA5OTgyNzE0OX0.tpAB7yZZH3S7MH6_EvNGWe5erJDNdZLnG0CgYDmmzRw';
  var TEST_TELEGRAM_ID = "809839462";

  var supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var telegramId = null;
  var currentSection = 'tasks';
  var currentLang = 'ru';

  // --- TELEGRAM ---
  function initTelegram() {
    try {
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        var user = window.Telegram.WebApp.initDataUnsafe?.user;
        if (user) {
          telegramId = String(user.id);
          console.log('✅ Telegram ID:', telegramId);
          return;
        }
      }
      telegramId = TEST_TELEGRAM_ID;
      console.log('⚠️ Тестовый ID:', telegramId);
    } catch (e) {
      telegramId = TEST_TELEGRAM_ID;
      console.error('❌ Ошибка Telegram:', e);
    }
  }

  // --- ПЕРЕВОДЫ ---
  var translations = {
    ru: {
      tasks: '📋 ЗАДАЧИ', payments: '💰 ПЛАТЕЖИ', settings: '⚙️ НАСТРОЙКИ',
      new_task: 'Новая задача', new_payment: 'Новый платёж',
      export: '📤 Экспорт', import: '📥 Импорт',
      theme: 'Тема', language: 'Язык',
      folder: 'Папка', priority: 'Приоритет',
      deadline: 'Дедлайн', due_date: 'Дата оплаты',
      recurrence: 'Периодичность', title: 'Название',
      add: '➕ Добавить', search: '🔍 Поиск...',
      share: '📤 Поделиться'
    },
    en: {
      tasks: '📋 TASKS', payments: '💰 PAYMENTS', settings: '⚙️ SETTINGS',
      new_task: 'New Task', new_payment: 'New Payment',
      export: '📤 Export', import: '📥 Import',
      theme: 'Theme', language: 'Language',
      folder: 'Folder', priority: 'Priority',
      deadline: 'Deadline', due_date: 'Due Date',
      recurrence: 'Recurrence', title: 'Title',
      add: '➕ Add', search: '🔍 Search...',
      share: '📤 Share'
    }
  };

  function t(key) { return translations[currentLang]?.[key] || key; }

  // --- ПРОФИЛЬ ---
  async function loadProfile() {
    try {
      if (!telegramId) { console.error('❌ Нет ID'); return; }

      // Сначала пробуем найти профиль
      var { data, error } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('telegram_id', telegramId)
        .maybeSingle();

      if (error && error.code !== 'PGRST116') {
        console.error('❌ Ошибка профиля:', error);
        return;
      }

      if (!data) {
        // Создаём профиль
        var { error: insertError } = await supabaseClient
          .from('profiles')
          .insert({ telegram_id: telegramId });
        
        if (insertError) {
          console.error('❌ Ошибка создания:', insertError);
        } else {
          console.log('✅ Профиль создан');
        }
        return;
      }

      currentLang = data.language || 'ru';
      if (data.theme === 'dark') document.body.classList.add('dark');
      else document.body.classList.remove('dark');
      console.log('✅ Профиль загружен');

    } catch (err) {
      console.error('❌ Ошибка:', err);
    }
  }

  // --- ОБНОВЛЕНИЕ ---
  function updateUI() {
    document.querySelectorAll('.nav-btn').forEach(function(btn) {
      var section = btn.dataset.section;
      if (section === 'tasks') btn.textContent = t('tasks');
      if (section === 'payments') btn.textContent = t('payments');
      if (section === 'settings') btn.textContent = t('settings');
    });
    document.getElementById('modal-title').textContent = 
      currentSection === 'tasks' ? t('new_task') : t('new_payment');
    document.getElementById('item-title').placeholder = t('title');
    document.getElementById('item-tags').placeholder = t('tags');
  }

  // --- ПАПКИ ---
  async function loadFolders() {
    try {
      var { data, error } = await supabaseClient
        .from('folders')
        .select('id, name')
        .eq('telegram_id', telegramId);

      if (error) throw error;
      var select = document.getElementById('item-folder');
      select.innerHTML = '<option value="">' + t('folder') + '</option>';
      if (data) {
        data.forEach(function(f) {
          var opt = document.createElement('option');
          opt.value = f.id;
          opt.textContent = f.name;
          select.appendChild(opt);
        });
      }
    } catch (err) {
      console.error('❌ Папки:', err);
    }
  }

  // --- ЗАДАЧИ ---
  async function renderTasks() {
    var content = document.getElementById('content');
    content.innerHTML = '<div class="loading">⏳ Загрузка...</div>';

    try {
      var { data, error } = await supabaseClient
        .from('tasks')
        .select('*')
        .eq('telegram_id', telegramId);

      if (error) throw error;
      content.innerHTML = '';

      // Шапка
      var header = document.createElement('div');
      header.className = 'glass-card';
      header.innerHTML = 
        '<div class="flex-between">' +
          '<input type="text" id="search-tasks" placeholder="' + t('search') + '" />' +
          '<button id="add-task-btn-main">' + t('add') + '</button>' +
        '</div>';
      content.appendChild(header);

      document.getElementById('add-task-btn-main').onclick = function() { openForm('tasks'); };

      document.getElementById('search-tasks').oninput = function() {
        var f = this.value.toLowerCase();
        document.querySelectorAll('.task-item').forEach(function(el) {
          el.style.display = el.textContent.toLowerCase().includes(f) ? '' : 'none';
        });
      };

      // Список
      if (data && data.length) {
        data.forEach(function(task) {
          var due = task.deadline ? new Date(task.deadline) : null;
          var cls = 'green';
          if (due) {
            var diff = (due - new Date()) / (1000*60*60*24);
            if (diff < 1) cls = 'red';
            else if (diff < 3) cls = 'yellow';
          }
          var div = document.createElement('div');
          div.className = 'task-item glass-card';
          div.innerHTML = 
            '<span>' + task.title + '</span>' +
            '<div><span class="deadline-indicator ' + cls + '"></span>' +
            '<button class="share-btn" data-type="task" data-id="' + task.id + '">' + t('share') + '</button></div>';
          content.appendChild(div);
          
          div.querySelector('.share-btn').onclick = function() {
            shareItem(this.dataset.type, this.dataset.id);
          };
        });
      } else {
        var empty = document.createElement('div');
        empty.className = 'glass-card empty-state';
        empty.textContent = '📭 Нет задач';
        content.appendChild(empty);
      }

    } catch (err) {
      console.error('❌ Ошибка задач:', err);
      content.innerHTML = '<div class="glass-card error-msg">❌ Ошибка загрузки задач</div>';
    }
  }

  // --- ПЛАТЕЖИ ---
  async function renderPayments() {
    var content = document.getElementById('content');
    content.innerHTML = '<div class="loading">⏳ Загрузка...</div>';

    try {
      var { data, error } = await supabaseClient
        .from('payments')
        .select('*')
        .eq('telegram_id', telegramId);

      if (error) throw error;
      content.innerHTML = '';

      var header = document.createElement('div');
      header.className = 'glass-card';
      header.innerHTML = 
        '<div class="flex-between">' +
          '<input type="text" id="search-payments" placeholder="' + t('search') + '" />' +
          '<button id="add-payment-btn-main">' + t('add') + '</button>' +
        '</div>';
      content.appendChild(header);

      document.getElementById('add-payment-btn-main').onclick = function() { openForm('payments'); };

      document.getElementById('search-payments').oninput = function() {
        var f = this.value.toLowerCase();
        document.querySelectorAll('.payment-item').forEach(function(el) {
          el.style.display = el.textContent.toLowerCase().includes(f) ? '' : 'none';
        });
      };

      if (data && data.length) {
        data.forEach(function(p) {
          var due = p.due_date ? new Date(p.due_date) : null;
          var cls = 'green';
          if (due) {
            var diff = (due - new Date()) / (1000*60*60*24);
            if (diff < 2) cls = 'red';
            else if (diff < 7) cls = 'yellow';
          }
          var div = document.createElement('div');
          div.className = 'payment-item glass-card';
          div.innerHTML = 
            '<span>' + p.title + '</span>' +
            '<div><span class="deadline-indicator ' + cls + '"></span>' +
            '<button class="share-btn" data-type="payment" data-id="' + p.id + '">' + t('share') + '</button></div>';
          content.appendChild(div);
          
          div.querySelector('.share-btn').onclick = function() {
            shareItem(this.dataset.type, this.dataset.id);
          };
        });
      } else {
        var empty = document.createElement('div');
        empty.className = 'glass-card empty-state';
        empty.textContent = '📭 Нет платежей';
        content.appendChild(empty);
      }

    } catch (err) {
      console.error('❌ Ошибка платежей:', err);
      content.innerHTML = '<div class="glass-card error-msg">❌ Ошибка загрузки платежей</div>';
    }
  }

  // --- ПОДЕЛИТЬСЯ ---
  async function shareItem(type, id) {
    try {
      var link = window.location.origin + '?share=' + type + '&id=' + id;
      await navigator.clipboard.writeText(link);
      alert('✅ Ссылка скопирована!');
    } catch (err) {
      alert('❌ Не удалось скопировать');
    }
  }

  // --- ЭКСПОРТ ---
  async function exportData() {
    try {
      var [tasks, payments] = await Promise.all([
        supabaseClient.from('tasks').select('*').eq('telegram_id', telegramId),
        supabaseClient.from('payments').select('*').eq('telegram_id', telegramId)
      ]);
      var wb = XLSX.utils.book_new();
      if (tasks.data?.length) {
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tasks.data), "Tasks");
      }
      if (payments.data?.length) {
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(payments.data), "Payments");
      }
      XLSX.writeFile(wb, 'tracker_' + Date.now() + '.xlsx');
      alert('✅ Экспорт выполнен!');
    } catch (err) {
      alert('❌ Ошибка экспорта');
    }
  }

  function importData() { alert('📥 Выберите файл Excel'); }

  // --- НАСТРОЙКИ ---
  function openSettings() {
    var content = document.getElementById('content');
    content.innerHTML = 
      '<div class="glass-card">' +
        '<h3>' + t('settings') + '</h3>' +
        '<p><button id="theme-toggle">🌓 ' + t('theme') + '</button></p>' +
        '<p><select id="lang-select">' +
          '<option value="ru" ' + (currentLang === 'ru' ? 'selected' : '') + '>Русский</option>' +
          '<option value="en" ' + (currentLang === 'en' ? 'selected' : '') + '>English</option>' +
        '</select></p>' +
        '<p><button id="export-btn">' + t('export') + '</button></p>' +
        '<p><button id="import-btn">' + t('import') + '</button></p>' +
      '</div>';

    document.getElementById('theme-toggle').onclick = toggleTheme;
    document.getElementById('lang-select').onchange = function() { changeLanguage(this.value); };
    document.getElementById('export-btn').onclick = exportData;
    document.getElementById('import-btn').onclick = importData;
  }

  // --- ТЕМА ---
  async function toggleTheme() {
    var isDark = document.body.classList.toggle('dark');
    try {
      await supabaseClient.from('profiles').update({ theme: isDark ? 'dark' : 'light' }).eq('telegram_id', telegramId);
    } catch (err) {}
  }

  // --- ЯЗЫК ---
  async function changeLanguage(lang) {
    currentLang = lang;
    try {
      await supabaseClient.from('profiles').update({ language: lang }).eq('telegram_id', telegramId);
    } catch (err) {}
    updateUI();
    if (currentSection === 'tasks') renderTasks();
    else if (currentSection === 'payments') renderPayments();
    else if (currentSection === 'settings') openSettings();
  }

  // --- ФОРМА ---
  function openForm(section) {
    currentSection = section;
    document.getElementById('modal-title').textContent = section === 'tasks' ? t('new_task') : t('new_payment');
    document.getElementById('modal-form').classList.toggle('hidden', section !== 'tasks');
    document.getElementById('modal-form-payment').classList.toggle('hidden', section !== 'payments');
    document.getElementById('modal').style.display = 'flex';
    if (section === 'tasks') loadFolders();
  }

  // --- НАВИГАЦИЯ ---
  function navigateTo(section) {
    currentSection = section;
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    var btn = document.querySelector('.nav-btn[data-section="' + section + '"]');
    if (btn) btn.classList.add('active');
    if (section === 'tasks') renderTasks();
    else if (section === 'payments') renderPayments();
    else if (section === 'settings') openSettings();
  }

  // --- ИНИЦИАЛИЗАЦИЯ ---
  function init() {
    console.log('🚀 Инициализация...');
    initTelegram();
    if (!telegramId) { alert('❌ Нет ID'); return; }

    loadProfile().then(function() {
      updateUI();
      
      document.querySelectorAll('.nav-btn').forEach(function(btn) {
        btn.onclick = function() { navigateTo(this.dataset.section); };
      });

      document.getElementById('settings-btn').onclick = function() { navigateTo('settings'); };

      document.getElementById('modal').onclick = function(e) {
        if (e.target === this) this.style.display = 'none';
      };

      // Форма задачи
      document.getElementById('modal-form').onsubmit = async function(e) {
        e.preventDefault();
        var title = document.getElementById('item-title').value;
        var folder = document.getElementById('item-folder').value;
        var priority = document.getElementById('item-priority').value;
        var deadline = document.getElementById('item-deadline').value;
        var tags = document.getElementById('item-tags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean);

        var { error } = await supabaseClient.from('tasks').insert([{
          telegram_id: telegramId, title: title,
          folder_id: folder || null, priority: priority,
          tags: tags, deadline: deadline || null
        }]);
        if (error) { alert('❌ Ошибка'); console.error(error); } else {
          document.getElementById('modal').style.display = 'none';
          this.reset();
          renderTasks();
        }
      };

      // Форма платежа
      document.getElementById('modal-form-payment').onsubmit = async function(e) {
        e.preventDefault();
        var title = document.getElementById('payment-title').value;
        var dueDate = document.getElementById('payment-due-date').value;
        var recurrence = document.getElementById('payment-recurrence').value;

        var { error } = await supabaseClient.from('payments').insert([{
          telegram_id: telegramId, title: title,
          due_date: dueDate, recurrence: recurrence
        }]);
        if (error) { alert('❌ Ошибка'); console.error(error); } else {
          document.getElementById('modal').style.display = 'none';
          this.reset();
          renderPayments();
        }
      };

      renderTasks();
      console.log('✅ Готово!');
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
