<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task & Payment Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@twa-dev/sdk"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  
  <style>
    :root {
      --bg-primary: #f0f4f8;
      --bg-secondary: rgba(255, 255, 255, 0.7);
      --text-primary: #2a3b4d;
      --accent: #6c5ce7;
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #ff7675;
      --border-radius: 12px;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 4px 16px rgba(31, 38, 135, 0.08);
      --font-family: 'Nunito', sans-serif;
    }

    .dark {
      --bg-primary: #0d1224;
      --bg-secondary: rgba(30, 30, 46, 0.7);
      --text-primary: #e0e0ff;
      --glass-bg: rgba(30, 30, 46, 0.2);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); transition: background-color 0.3s ease, color 0.3s ease; }
    body { background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
    .container { max-width: 1200px; width: 100%; margin: 0 auto; padding: 16px 20px 80px 20px; }
    .glass-card { background: var(--glass-bg); backdrop-filter: blur(8px); border: 1px solid var(--glass-border); border-radius: var(--border-radius); box-shadow: var(--glass-shadow); padding: 20px; margin-bottom: 16px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
    header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    header .icon { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }
    
    .nav-mobile { position: fixed; bottom: 0; left: 0; right: 0; display: none; justify-content: space-around; padding: 12px; background: var(--glass-bg); backdrop-filter: blur(12px); border-top: 1px solid var(--glass-border); z-index: 100; }
    .nav-btn { background: none; border: none; color: var(--text-primary); font-size: 0.65rem; cursor: pointer; padding: 4px 8px; border-radius: 8px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 2px; opacity: 0.6; }
    .nav-btn .icon { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
    .nav-btn.active { opacity: 1; color: var(--accent); }
    .nav-btn.active .icon { stroke: var(--accent); }
    
    .desktop-nav { 
      display: none; 
      flex-direction: column; 
      width: 56px; 
      padding: 12px 8px; 
      position: fixed; 
      top: 50%;
      left: 16px;
      transform: translateY(-50%);
      background: var(--glass-bg); 
      backdrop-filter: blur(12px); 
      border: 1px solid var(--glass-border); 
      border-radius: 16px;
      z-index: 50;
      gap: 4px;
      box-shadow: var(--glass-shadow);
    }
    .desktop-nav.visible { display: flex; }
    .desktop-nav .nav-btn { 
      flex-direction: column; 
      align-items: center;
      gap: 2px; 
      padding: 8px 4px; 
      font-size: 0.55rem;
      width: 100%;
      border-radius: 10px;
      opacity: 0.5;
      transition: all 0.2s;
    }
    .desktop-nav .nav-btn:hover { opacity: 0.8; background: var(--glass-bg); }
    .desktop-nav .nav-btn .icon { width: 20px; height: 20px; }
    .desktop-nav .nav-btn.active { opacity: 1; background: var(--accent); color: white; }
    .desktop-nav .nav-btn.active .icon { stroke: white; }
    
    main { padding-top: 8px; }
    main.full-width { margin-left: 0; }
    main.with-nav { margin-left: 72px; }
    
    @media (min-width: 768px) { 
      .nav-mobile { display: none !important; } 
      .desktop-nav.visible { display: flex; }
      main.with-nav { margin-left: 72px; }
      .container { padding: 16px 24px 20px 24px; }
    }
    @media (max-width: 767px) {
      .desktop-nav { display: none !important; }
      main.with-nav { margin-left: 0; }
      main.full-width { margin-left: 0; }
      .nav-mobile { display: flex !important; }
    }

    .task-item, .payment-item { padding: 12px 16px; border-radius: 10px; margin: 6px 0; display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary); border: 1px solid var(--glass-border); }
    .deadline-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-left: 8px; }
    .green { background: var(--success); }
    .yellow { background: var(--warning); }
    .red { background: var(--danger); }
    
    input, select, button { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--glass-border); background: var(--bg-secondary); color: var(--text-primary); margin: 4px 0; font-size: 15px; width: 100%; outline: none; }
    input:focus, select:focus { border-color: var(--accent); }
    button { background: var(--accent); color: white; cursor: pointer; border: none; font-weight: 600; padding: 10px 20px; width: auto; display: inline-flex; align-items: center; gap: 8px; justify-content: center; border-radius: 10px; }
    button .icon { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2; }
    button.secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--glass-border); }
    button.secondary .icon { stroke: var(--text-primary); }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 200; justify-content: center; align-items: center; }
    .modal-content { width: 90%; max-width: 460px; padding: 24px; border-radius: var(--border-radius); background: var(--bg-secondary); box-shadow: var(--glass-shadow); backdrop-filter: blur(12px); max-height: 90vh; overflow-y: auto; border: 1px solid var(--glass-border); }
    .hidden { display: none !important; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .flex-between input { flex: 1; }
    .flex-between button { width: auto; }
    
    .loading { text-align: center; padding: 40px; font-size: 16px; opacity: 0.6; }
    .empty-state { text-align: center; padding: 30px; color: var(--text-primary); opacity: 0.5; font-size: 14px; }
    .error-msg { background: var(--danger); color: white; padding: 14px; border-radius: var(--border-radius); text-align: center; }
    .user-badge { display: flex; align-items: center; gap: 8px; font-size: 13px; opacity: 0.8; }
    .user-badge .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
    .sync-status { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--success); color: white; display: inline-block; }
    .sync-status.offline { background: var(--danger); }
    .sync-status.loading { background: var(--warning); color: #333; }
    
    .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; gap: 16px; }
    .login-screen h2 { font-size: 24px; }
    .login-screen p { opacity: 0.6; max-width: 360px; font-size: 14px; }
    .login-icon { width: 64px; height: 64px; stroke: var(--accent); fill: none; stroke-width: 1.5; }
    .telegram-login { background: #0088cc; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; padding: 14px 32px; width: 100%; max-width: 280px; border-radius: 12px; }
    .telegram-login:hover { background: #006699; }
    .telegram-login .icon { stroke: white; width: 22px; height: 22px; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; display: inline-flex; align-items: center; border-radius: 8px; }
    .icon-btn:hover { background: var(--glass-bg); }
    .icon-btn .icon { width: 20px; height: 20px; stroke: var(--text-primary); fill: none; stroke-width: 2; }
    
    .export-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .export-options button { flex: 1; min-width: 80px; }
    .tag { display: inline-block; background: var(--glass-bg); padding: 2px 10px; border-radius: 12px; font-size: 11px; margin: 2px; border: 1px solid var(--glass-border); }
    .flex-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--glass-border); }
    .settings-row:last-child { border-bottom: none; }
    .settings-row label { font-size: 14px; font-weight: 600; }
    .settings-row select, .settings-row button { width: auto; margin: 0; }
    
    .bot-login-hint { font-size: 12px; opacity: 0.5; margin-top: 12px; padding: 12px; background: var(--glass-bg); border-radius: 8px; border: 1px dashed var(--glass-border); }
    .bot-login-hint a { color: var(--accent); text-decoration: none; }
    .bot-login-hint a:hover { text-decoration: underline; }
  </style>
</head>

  <div class="desktop-nav" id="desktop-nav">

<div class="nav-mobile" id="nav-mobile">

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title" style="margin-bottom:12px;">Новая задача</h3>
    <form id="modal-form">
      <input type="text" id="item-title" placeholder="Название" required />
      <select id="item-folder"><option value="">Без папки</option></select>
      <select id="item-priority">
        <option value="low">Низкий</option>
        <option value="medium">Средний</option>
        <option value="high">Высокий</option>
      </select>
      <input type="date" id="item-deadline" />
      <input type="text" id="item-tags" placeholder="Теги (через запятую)" />
      <button type="submit">
        <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Создать
      </button>
    </form>
    <form id="modal-form-payment" class="hidden">
      <input type="text" id="payment-title" placeholder="Название" required />
      <input type="date" id="payment-due-date" required />
      <select id="payment-recurrence">
        <option value="1m">1 месяц</option>
        <option value="2m">2 месяца</option>
        <option value="3m">3 месяца</option>
        <option value="6m">6 месяцев</option>
        <option value="1y">1 год</option>
      </select>
      <button type="submit">
        <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Создать
      </button>
    </form>
  </div>
</div>

<div class="modal" id="export-modal">
  <div class="modal-content">
    <h3 id="export-title" style="margin-bottom:12px;">Экспорт данных</h3>
    <div id="export-content">
      <p style="margin-bottom:14px;opacity:0.6;font-size:14px;">Выберите формат для экспорта данных</p>
      <div class="export-options">
        <button id="export-json-btn">
          <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>
          JSON

        <button id="export-excel-btn">
          <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="16" x2="16" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="20" x2="13" y2="20"/></svg>
          Excel
        </button>
      </div>
    </div>
    <div id="import-content" class="hidden">
      <p style="margin-bottom:14px;opacity:0.6;font-size:14px;">Выберите файл для импорта (JSON или Excel)</p>
      <input type="file" id="import-file" accept=".json,.xlsx,.xls" style="margin-bottom:10px;" />
      <button id="import-btn-main">
        <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>
        Импортировать
      </button>
      <button class="secondary" id="import-cancel-btn" style="margin-top:6px;">Отмена</button>
    </div>
    <button class="secondary" id="export-close-btn" style="margin-top:10px;">Закрыть</button>
  </div>
</div>

  function initAuth() {
    try {
      // Проверяем, запущено ли в Telegram WebApp
      if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
        Telegram.WebApp.ready();
        
        var user = Telegram.WebApp.initDataUnsafe?.user;
        
        if (user) {
          // ✅ Автоматический вход в Telegram
          telegramId = String(user.id);
          userData = {
            id: String(user.id),
            username: user.username || user.first_name || 'Пользователь',
            firstName: user.first_name || '',
            lastName: user.last_name || '',
            photoUrl: user.photo_url || null
          };
          isAuthorized = true;
          console.log('✅ Автоматический вход в Telegram:', userData.username, 'ID:', telegramId);
          return true;
        } else {
          // В Telegram, но пользователь не авторизован (маловероятно)
          console.warn('⚠️ Telegram WebApp есть, но пользователь не найден');
          isAuthorized = false;
          return false;
        }
      }
      
      // Если не в Telegram - показываем экран входа
      console.log('🌐 Приложение открыто в браузере');
      isAuthorized = false;
      return false;
      
    } catch (e) {
      console.error('❌ Ошибка авторизации:', e);
      isAuthorized = false;
      return false;
    }
  }

  async function loadProfile() {
    try {
      if (!telegramId) {
        console.error('❌ Нет Telegram ID');
        return;
      }
      
      setSyncStatus('loading');
      console.log('📡 Загрузка профиля для ID:', telegramId);
      
      var { data, error } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('telegram_id', telegramId)
        .maybeSingle();

      if (error && error.code !== 'PGRST116') {
        console.error('❌ Ошибка запроса профиля:', error);
        setSyncStatus('error');
        return;
      }

      if (!data) {
        console.log('🆕 Создание профиля для ID:', telegramId);
        var { error: insertError } = await supabaseClient
          .from('profiles')
          .insert([{ 
            telegram_id: telegramId, 
            username: userData?.username || t('guest'),
            language: 'ru',
            theme: 'light'
          }]);
        if (insertError) { 
          console.error('❌ Ошибка создания профиля:', insertError);
          setSyncStatus('error'); 
          return; 
        }
        console.log('✅ Профиль создан');
        setSyncStatus('ok');
        return;
      }

      currentLang = data.language || 'ru';
      if (data.theme === 'dark') document.body.classList.add('dark');
      else document.body.classList.remove('dark');
      console.log('✅ Профиль загружен, язык:', currentLang);
      setSyncStatus('ok');
    } catch (err) {
      console.error('❌ Ошибка загрузки профиля:', err);
      setSyncStatus('error');
    }
  }

          '<input type="text" id="search-tasks" placeholder="' + t('search') + '" />' +

            '<svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +

            task.tags.map(function(tag) { return '<span class="tag">' + tag + '</span>'; }).join('') : '';

            (tagsHtml ? '<div class="flex-wrap" style="margin-top:4px;">' + tagsHtml + '</div>' : '') +
            '</div>' +
            '<div style="display:flex;align-items:center;gap:6px;">' +

              '<button class="icon-btn share-btn" data-type="task" data-id="' + task.id + '" title="Поделиться">' +

        empty.textContent = t('no_tasks');

    } catch (err) {
      console.error('Ошибка загрузки задач:', err);

    }
  }

  async function exportData(format) {
    try {
      var [tasksRes, paymentsRes] = await Promise.all([
        supabaseClient.from('tasks').select('*').eq('telegram_id', telegramId),
        supabaseClient.from('payments').select('*').eq('telegram_id', telegramId)
      ]);

      var data = {
        tasks: tasksRes.data || [],
        payments: paymentsRes.data || [],
        exported_at: new Date().toISOString(),
        version: '1.0'
      };

      if (format === 'json') {
        var json = JSON.stringify(data, null, 2);
        var blob = new Blob([json], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'tracker_data_' + Date.now() + '.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } else if (format === 'excel') {
        var wb = XLSX.utils.book_new();
        if (data.tasks.length) {
          var wsTasks = XLSX.utils.json_to_sheet(data.tasks);
          XLSX.utils.book_append_sheet(wb, wsTasks, 'Tasks');
        }
        if (data.payments.length) {
          var wsPayments = XLSX.utils.json_to_sheet(data.payments);
          XLSX.utils.book_append_sheet(wb, wsPayments, 'Payments');
        }
        XLSX.writeFile(wb, 'tracker_data_' + Date.now() + '.xlsx');
      }
      
      alert('✅ ' + t('export_success'));
      closeExportModal();
    } catch (err) {
      console.error('Ошибка экспорта:', err);
      alert('❌ ' + t('error'));
    }
  }

  async function importData() {
    var fileInput = document.getElementById('import-file');
    var file = fileInput.files[0];
    if (!file) {
      alert(t('select_file'));
      return;
    }

    try {
      var text = await file.text();
      var data;
      
      if (file.name.endsWith('.json')) {
        data = JSON.parse(text);
      } else {
        var workbook = XLSX.read(text, { type: 'string' });
        data = { tasks: [], payments: [] };
        if (workbook.Sheets['Tasks']) {
          data.tasks = XLSX.utils.sheet_to_json(workbook.Sheets['Tasks']);
        }
        if (workbook.Sheets['Payments']) {
          data.payments = XLSX.utils.sheet_to_json(workbook.Sheets['Payments']);
        }
      }

      if ((!data.tasks || !data.tasks.length) && (!data.payments || !data.payments.length)) {
        alert(t('import_error'));
        return;
      }

      if (data.tasks && data.tasks.length) {
        var tasksToInsert = data.tasks.map(function(t) {
          return {
            telegram_id: telegramId,
            title: t.title || t.name || 'Без названия',
            folder_id: t.folder_id || null,
            priority: t.priority || 'medium',
            tags: t.tags || [],
            deadline: t.deadline || null
          };
        });
        await supabaseClient.from('tasks').insert(tasksToInsert);
      }

      if (data.payments && data.payments.length) {
        var paymentsToInsert = data.payments.map(function(p) {
          return {
            telegram_id: telegramId,
            title: p.title || p.name || 'Без названия',
            due_date: p.due_date || p.dueDate || null,
            recurrence: p.recurrence || '1m'
          };
        });
        await supabaseClient.from('payments').insert(paymentsToInsert);
      }

      alert('✅ ' + t('import_success'));
      closeExportModal();
      if (currentSection === 'tasks') renderTasks();
      else if (currentSection === 'payments') renderPayments();
      
    } catch (err) {
      console.error('Ошибка импорта:', err);
      alert('❌ ' + t('import_error'));
    }
  }

    updateUI();
    if (currentSection === 'tasks') renderTasks();
    else if (currentSection === 'payments') renderPayments();
    else if (currentSection === 'settings') openSettings();
  }

  // ============================================================
  // 16. ФОРМЫ
  // ============================================================
  function openForm(section) {
    currentSection = section;
    document.getElementById('modal-title').textContent = section === 'tasks' ? t('new_task') : t('new_payment');
    document.getElementById('modal-form').classList.toggle('hidden', section !== 'tasks');
    document.getElementById('modal-form-payment').classList.toggle('hidden', section !== 'payments');
    document.getElementById('modal').style.display = 'flex';
    if (section === 'tasks') loadFolders();
  }

  function setupModal() {
    document.getElementById('modal').onclick = function(e) {
      if (e.target === this) this.style.display = 'none';
    };
    document.getElementById('export-modal').onclick = function(e) {
      if (e.target === this) this.style.display = 'none';
    };
    
    document.getElementById('export-json-btn').onclick = function() { exportData('json'); };
    document.getElementById('export-excel-btn').onclick = function() { exportData('excel'); };
    document.getElementById('import-btn-main').onclick = importData;
    document.getElementById('import-cancel-btn').onclick = closeExportModal;
    document.getElementById('export-close-btn').onclick = closeExportModal;
  }

  function setupForms() {
    document.getElementById('modal-form').onsubmit = async function(e) {
      e.preventDefault();
      var title = document.getElementById('item-title').value;
      var folder = document.getElementById('item-folder').value;
      var priority = document.getElementById('item-priority').value;
      var deadline = document.getElementById('item-deadline').value;
      var tags = document.getElementById('item-tags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean);

      setSyncStatus('loading');
      var { error } = await supabaseClient.from('tasks').insert([{
        telegram_id: telegramId, title: title,
        folder_id: folder || null, priority: priority,
        tags: tags, deadline: deadline || null
      }]);
      if (error) { 
        alert('❌ ' + t('error')); 
        setSyncStatus('error');
        console.error(error);
      } else {
        document.getElementById('modal').style.display = 'none';
        this.reset();
        renderTasks();
        setSyncStatus('ok');
      }
    };

    document.getElementById('modal-form-payment').onsubmit = async function(e) {
      e.preventDefault();
      var title = document.getElementById('payment-title').value;
      var dueDate = document.getElementById('payment-due-date').value;
      var recurrence = document.getElementById('payment-recurrence').value;

      setSyncStatus('loading');
      var { error } = await supabaseClient.from('payments').insert([{
        telegram_id: telegramId, title: title,
        due_date: dueDate, recurrence: recurrence
      }]);
      if (error) { 
        alert('❌ ' + t('error')); 
        setSyncStatus('error');
        console.error(error);
      } else {
        document.getElementById('modal').style.display = 'none';
        this.reset();
        renderPayments();
        setSyncStatus('ok');
      }
    };
  }

  // ============================================================
  // 17. НАВИГАЦИЯ
  // ============================================================
  function setupNavigation() {
    document.querySelectorAll('.nav-btn').forEach(function(btn) {
      btn.onclick = function() { navigateTo(this.dataset.section); };
    });
    document.getElementById('settings-btn').onclick = function() { navigateTo('settings'); };
  }

  function navigateTo(section) {
    currentSection = section;
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    var btn = document.querySelector('.nav-btn[data-section="' + section + '"]');
    if (btn) btn.classList.add('active');
    if (section === 'tasks') renderTasks();
    else if (section === 'payments') renderPayments();
    else if (section === 'settings') openSettings();
  }

  // ============================================================
  // 18. ИНИЦИАЛИЗАЦИЯ
  // ============================================================
  function init() {
    console.log('🚀 Инициализация...');
    
    showNavigation(false);
    
    // Пробуем авторизоваться через Telegram
    var hasAuth = initAuth();
    
    if (hasAuth && telegramId) {
      // ✅ В Telegram - автоматический вход
      console.log('👤 Автоматический вход в Telegram, ID:', telegramId);
      showNavigation(true);
      updateUserUI();
      loadProfile().then(function() {
        updateUI();
        setupNavigation();
        setupModal();
        setupForms();
        renderTasks();
        console.log('✅ Приложение готово!');
      });
    } else {
      // ❌ В браузере - показываем экран входа
      console.log('🌐 Показываем экран входа для браузера');
      renderLoginScreen();
    }
  }

  // ============================================================
  // 19. ЗАПУСК
  // ============================================================
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
