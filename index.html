<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task & Payment Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Сначала загружаем SDK по порядку -->
  <script src="https://unpkg.com/@twa-dev/sdk"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  
  <style>
    :root {
      --bg-primary: #f0f4f8;
      --bg-secondary: rgba(255, 255, 255, 0.7);
      --text-primary: #2a3b4d;
      --accent: #6c5ce7;
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #ff7675;
      --border-radius: 16px;
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
      --font-family: 'Nunito', sans-serif;
    }

    .dark {
      --bg-primary: #0d1224;
      --bg-secondary: rgba(30, 30, 46, 0.7);
      --text-primary: #e0e0ff;
      --glass-bg: rgba(30, 30, 46, 0.3);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--font-family);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      padding-bottom: 80px;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      box-shadow: var(--glass-shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }

    header h1 {
      font-size: 24px;
      font-weight: 700;
    }

    .nav-mobile {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      padding: 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--glass-border);
      z-index: 100;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1rem;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
    }

    .nav-btn.active {
      background: var(--accent);
      color: white;
    }

    .task-item, .payment-item {
      padding: 12px;
      border-radius: 12px;
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-secondary);
    }

    .deadline-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-left: 8px;
    }

    .green { background: var(--success); }
    .yellow { background: var(--warning); }
    .red { background: var(--danger); }

    input, select, button {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      margin: 4px 0;
      font-size: 16px;
    }

    button {
      background: var(--accent);
      color: white;
      cursor: pointer;
      border: none;
      font-weight: 600;
      padding: 12px 24px;
    }

    button:hover {
      opacity: 0.9;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      width: 90%;
      max-width: 500px;
      padding: 24px;
      border-radius: var(--border-radius);
      background: var(--bg-secondary);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(10px);
    }

    .hidden {
      display: none;
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .flex-between input {
      flex: 1;
    }

    @media (min-width: 768px) {
      .nav-mobile {
        display: none;
      }
      .desktop-nav {
        display: flex;
        flex-direction: column;
        width: 200px;
        padding: 20px;
        position: fixed;
        height: 100%;
        top: 0;
        left: 0;
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        border-right: 1px solid var(--glass-border);
      }
      main {
        margin-left: 220px;
        padding-top: 20px;
      }
      .container {
        padding-bottom: 20px;
      }
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      opacity: 0.7;
    }
  </style>
</head>
<body class="light">

<div class="container">
  <header id="app-header">
    <h1>Tracker</h1>
    <button id="settings-btn">⚙️</button>
  </header>

  <div class="desktop-nav hidden">
    <button class="nav-btn active" data-section="tasks">ЗАДАЧИ</button>
    <button class="nav-btn" data-section="payments">ПЛАТЕЖИ</button>
    <button class="nav-btn" data-section="settings">НАСТРОЙКИ</button>
  </div>

  <main id="content">
    <div class="loading">Загрузка...</div>
  </main>
</div>

<!-- Мобильная навигация -->
<div class="nav-mobile">
  <button class="nav-btn active" data-section="tasks">ЗАДАЧИ</button>
  <button class="nav-btn" data-section="payments">ПЛАТЕЖИ</button>
</div>

<!-- Модальное окно -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Новая задача</h3>
    <form id="modal-form">
      <input type="text" id="item-title" placeholder="Название" required />
      <select id="item-folder">
        <option value="">Без папки</option>
      </select>
      <select id="item-priority">
        <option value="low">Низкий</option>
        <option value="medium">Средний</option>
        <option value="high">Высокий</option>
      </select>
      <input type="date" id="item-deadline" />
      <input type="text" id="item-tags" placeholder="Теги (через запятую)" />
      <button type="submit">Создать</button>
    </form>
    <form id="modal-form-payment" class="hidden">
      <input type="text" id="payment-title" placeholder="Название" required />
      <input type="date" id="payment-due-date" required />
      <select id="payment-recurrence">
        <option value="1m">1 месяц</option>
        <option value="2m">2 месяца</option>
        <option value="3m">3 месяца</option>
        <option value="6m">6 месяцев</option>
        <option value="1y">1 год</option>
      </select>
      <button type="submit">Создать</button>
    </form>
  </div>
</div>

<script>
  // --- КОНФИГУРАЦИЯ ---
  const SUPABASE_URL = 'https://lzwbdobhodwdmjzcmdjs.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6d2Jkb2Job2R3ZG1qemNtZGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNTExNDksImV4cCI6MjA5OTgyNzE0OX0.tpAB7yZZH3S7MH6_EvNGWe5erJDNdZLnG0CgYDmmzRw';
  
  // ТЕСТОВЫЙ TELEGRAM ID - замените на свой!
  const TEST_TELEGRAM_ID = "809839462";
  // ----------------------

  // Создаем клиент Supabase
  const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);

  let telegramId = null;
  let currentSection = 'tasks';
  let currentLang = 'ru';

  // --- ИНИЦИАЛИЗАЦИЯ TELEGRAM ---
  function initTelegram() {
    try {
      // Проверяем, запущено ли в Telegram
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        const user = window.Telegram.WebApp.initDataUnsafe?.user;
        if (user) {
          telegramId = String(user.id);
          console.log('✅ Telegram ID получен:', telegramId);
          return;
        }
      }
      
      // Если не в Telegram или нет пользователя - используем тестовый ID
      console.warn('⚠️ Используем тестовый Telegram ID:', TEST_TELEGRAM_ID);
      telegramId = TEST_TELEGRAM_ID;
      
    } catch (e) {
      console.error('❌ Ошибка инициализации Telegram:', e);
      telegramId = TEST_TELEGRAM_ID;
    }
  }

  // --- ПЕРЕВОДЫ ---
  const translations = {
    ru: {
      tasks: 'ЗАДАЧИ',
      payments: 'ПЛАТЕЖИ',
      settings: 'НАСТРОЙКИ',
      new_task: 'Новая задача',
      new_payment: 'Новый платёж',
      export: 'Экспорт',
      import: 'Импорт',
      theme: 'Тема',
      language: 'Язык',
      folder: 'Папка',
      priority: 'Приоритет',
      deadline: 'Дедлайн',
      due_date: 'Дата оплаты',
      recurrence: 'Периодичность',
      title: 'Название',
      add: 'Добавить',
      search: 'Поиск...',
      share: 'Поделиться',
      green: 'Зелёный',
      yellow: 'Жёлтый',
      red: 'Красный'
    },
    en: {
      tasks: 'TASKS',
      payments: 'PAYMENTS',
      settings: 'SETTINGS',
      new_task: 'New Task',
      new_payment: 'New Payment',
      export: 'Export',
      import: 'Import',
      theme: 'Theme',
      language: 'Language',
      folder: 'Folder',
      priority: 'Priority',
      deadline: 'Deadline',
      due_date: 'Due Date',
      recurrence: 'Recurrence',
      title: 'Title',
      add: 'Add',
      search: 'Search...',
      share: 'Share',
      green: 'Green',
      yellow: 'Yellow',
      red: 'Red'
    }
  };

  function t(key) {
    return translations[currentLang]?.[key] || key;
  }

  // --- ЗАГРУЗКА ПРОФИЛЯ ---
  async function loadProfile() {
    try {
      if (!telegramId) {
        console.error('❌ Нет Telegram ID');
        return;
      }

      const { data, error } = await supabase
        .from('profiles')
        .select('*')
        .eq('telegram_id', telegramId)
        .single();

      if (error) {
        if (error.code === 'PGRST116') {
          // Профиль не найден - создаем
          const { error: insertError } = await supabase
            .from('profiles')
            .insert([{ telegram_id: telegramId }]);
          
          if (insertError) {
            console.error('❌ Ошибка создания профиля:', insertError);
          } else {
            console.log('✅ Профиль создан');
            currentLang = 'ru';
          }
        } else {
          console.error('❌ Ошибка загрузки профиля:', error);
        }
        return;
      }

      if (data) {
        currentLang = data.language || 'ru';
        if (data.theme === 'dark') {
          document.body.classList.add('dark');
        } else {
          document.body.classList.remove('dark');
        }
        console.log('✅ Профиль загружен');
      }
    } catch (err) {
      console.error('❌ Ошибка:', err);
    }
  }

  // --- ОБНОВЛЕНИЕ UI ---
  function updateUI() {
    document.querySelectorAll('.nav-btn').forEach(btn => {
      const section = btn.dataset.section;
      if (section === 'tasks') btn.textContent = t('tasks');
      if (section === 'payments') btn.textContent = t('payments');
      if (section === 'settings') btn.textContent = t('settings');
    });

    document.getElementById('modal-title').textContent = 
      currentSection === 'tasks' ? t('new_task') : t('new_payment');
    
    document.getElementById('item-title').placeholder = t('title');
    document.getElementById('item-tags').placeholder = t('tags');
    
    const formBtn = document.querySelector('#modal-form button[type="submit"]');
    if (formBtn) formBtn.textContent = t('add');
    
    const paymentBtn = document.querySelector('#modal-form-payment button[type="submit"]');
    if (paymentBtn) paymentBtn.textContent = t('add');
  }

  // --- ЗАГРУЗКА ПАПОК ---
  async function loadFolders() {
    try {
      const { data, error } = await supabase
        .from('folders')
        .select('id, name')
        .eq('telegram_id', telegramId);

      if (error) throw error;

      const select = document.getElementById('item-folder');
      select.innerHTML = `<option value="">${t('folder')}</option>`;
      
      if (data) {
        data.forEach(folder => {
          const option = document.createElement('option');
          option.value = folder.id;
          option.textContent = folder.name;
          select.appendChild(option);
        });
      }
    } catch (err) {
      console.error('❌ Ошибка загрузки папок:', err);
    }
  }

  // --- ОТОБРАЖЕНИЕ ЗАДАЧ ---
  async function renderTasks() {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading">Загрузка задач...</div>';

    try {
      const { data, error } = await supabase
        .from('tasks')
        .select('*')
        .eq('telegram_id', telegramId);

      if (error) throw error;

      content.innerHTML = '';

      // Карточка с поиском и кнопкой добавления
      const headerCard = document.createElement('div');
      headerCard.className = 'glass-card';
      headerCard.innerHTML = `
        <div class="flex-between">
          <input type="text" id="search-tasks" placeholder="${t('search')}" />
          <button id="add-task-btn-main">${t('add')}</button>
        </div>
      `;
      content.appendChild(headerCard);

      // Обработчик кнопки "Добавить"
      document.getElementById('add-task-btn-main').addEventListener('click', function(e) {
        e.stopPropagation();
        openForm('tasks');
      });

      // Поиск
      const searchInput = document.getElementById('search-tasks');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          const filter = this.value.toLowerCase();
          document.querySelectorAll('.task-item').forEach(el => {
            el.style.display = el.textContent.toLowerCase().includes(filter) ? '' : 'none';
          });
        });
      }

      // Список задач
      if (data && data.length > 0) {
        data.forEach(task => {
          const dueDate = task.deadline ? new Date(task.deadline) : null;
          let statusClass = 'green';
          if (dueDate) {
            const diff = (dueDate - new Date()) / (1000 * 60 * 60 * 24);
            if (diff < 1) statusClass = 'red';
            else if (diff < 3) statusClass = 'yellow';
          }

          const div = document.createElement('div');
          div.className = 'task-item glass-card';
          div.innerHTML = `
            <span>${task.title}</span>
            <div>
              <span class="deadline-indicator ${statusClass}"></span>
              <button class="share-btn" data-type="task" data-id="${task.id}">${t('share')}</button>
            </div>
          `;
          content.appendChild(div);

          // Обработчик для кнопки "Поделиться"
          const shareBtn = div.querySelector('.share-btn');
          if (shareBtn) {
            shareBtn.addEventListener('click', function() {
              shareItem(this.dataset.type, this.dataset.id);
            });
          }
        });
      } else {
        const empty = document.createElement('div');
        empty.className = 'glass-card';
        empty.textContent = 'Нет задач';
        content.appendChild(empty);
      }

    } catch (err) {
      console.error('❌ Ошибка загрузки задач:', err);
      content.innerHTML = `<div class="glass-card">Ошибка загрузки задач</div>`;
    }
  }

  // --- ОТОБРАЖЕНИЕ ПЛАТЕЖЕЙ ---
  async function renderPayments() {
    const content = document.getElementById('content');
    content.innerHTML = '<div class="loading">Загрузка платежей...</div>';

    try {
      const { data, error } = await supabase
        .from('payments')
        .select('*')
        .eq('telegram_id', telegramId);

      if (error) throw error;

      content.innerHTML = '';

      const headerCard = document.createElement('div');
      headerCard.className = 'glass-card';
      headerCard.innerHTML = `
        <div class="flex-between">
          <input type="text" id="search-payments" placeholder="${t('search')}" />
          <button id="add-payment-btn-main">${t('add')}</button>
        </div>
      `;
      content.appendChild(headerCard);

      document.getElementById('add-payment-btn-main').addEventListener('click', function(e) {
        e.stopPropagation();
        openForm('payments');
      });

      const searchInput = document.getElementById('search-payments');
      if (searchInput) {
        searchInput.addEventListener('input', function() {
          const filter = this.value.toLowerCase();
          document.querySelectorAll('.payment-item').forEach(el => {
            el.style.display = el.textContent.toLowerCase().includes(filter) ? '' : 'none';
          });
        });
      }

      if (data && data.length > 0) {
        data.forEach(payment => {
          const dueDate = payment.due_date ? new Date(payment.due_date) : null;
          let statusClass = 'green';
          if (dueDate) {
            const diff = (dueDate - new Date()) / (1000 * 60 * 60 * 24);
            if (diff < 2) statusClass = 'red';
            else if (diff < 7) statusClass = 'yellow';
          }

          const div = document.createElement('div');
          div.className = 'payment-item glass-card';
          div.innerHTML = `
            <span>${payment.title}</span>
            <div>
              <span class="deadline-indicator ${statusClass}"></span>
              <button class="share-btn" data-type="payment" data-id="${payment.id}">${t('share')}</button>
            </div>
          `;
          content.appendChild(div);

          const shareBtn = div.querySelector('.share-btn');
          if (shareBtn) {
            shareBtn.addEventListener('click', function() {
              shareItem(this.dataset.type, this.dataset.id);
            });
          }
        });
      } else {
        const empty = document.createElement('div');
        empty.className = 'glass-card';
        empty.textContent = 'Нет платежей';
        content.appendChild(empty);
      }

    } catch (err) {
      console.error('❌ Ошибка загрузки платежей:', err);
      content.innerHTML = `<div class="glass-card">Ошибка загрузки платежей</div>`;
    }
  }

  // --- ПОДЕЛИТЬСЯ ---
  async function shareItem(type, id) {
    try {
      const link = `${window.location.origin}?shared_resource=${type}&id=${id}`;
      await navigator.clipboard.writeText(link);
      alert('Ссылка скопирована!');
    } catch (err) {
      console.error('❌ Ошибка копирования:', err);
      alert('Не удалось скопировать ссылку');
    }
  }

  // --- ЭКСПОРТ ---
  async function exportData() {
    try {
      const [tasksRes, paymentsRes] = await Promise.all([
        supabase.from('tasks').select('*').eq('telegram_id', telegramId),
        supabase.from('payments').select('*').eq('telegram_id', telegramId)
      ]);

      const wb = XLSX.utils.book_new();
      
      if (tasksRes.data?.length) {
        const ws = XLSX.utils.json_to_sheet(tasksRes.data);
        XLSX.utils.book_append_sheet(wb, ws, "Tasks");
      }
      if (paymentsRes.data?.length) {
        const ws = XLSX.utils.json_to_sheet(paymentsRes.data);
        XLSX.utils.book_append_sheet(wb, ws, "Payments");
      }

      XLSX.writeFile(wb, `tracker_data_${Date.now()}.xlsx`);
    } catch (err) {
      console.error('❌ Ошибка экспорта:', err);
      alert('Ошибка экспорта');
    }
  }

  function importData() {
    alert('Импорт: выберите файл Excel');
  }

  // --- НАСТРОЙКИ ---
  function openSettings() {
    const content = document.getElementById('content');
    content.innerHTML = `
      <div class="glass-card">
        <h3>${t('settings')}</h3>
        <p><label>${t('theme')}:</label> 
          <button id="theme-toggle">Переключить</button>
        </p>
        <p><label>${t('language')}:</label>
          <select id="lang-select">
            <option value="ru" ${currentLang === 'ru' ? 'selected' : ''}>Русский</option>
            <option value="en" ${currentLang === 'en' ? 'selected' : ''}>English</option>
          </select>
        </p>
        <p><button id="export-btn">${t('export')}</button></p>
        <p><button id="import-btn">${t('import')}</button></p>
      </div>
    `;

    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    document.getElementById('lang-select').addEventListener('change', function() {
      changeLanguage(this.value);
    });
    document.getElementById('export-btn').addEventListener('click', exportData);
    document.getElementById('import-btn').addEventListener('click', importData);
  }

  // --- ПЕРЕКЛЮЧЕНИЕ ТЕМЫ ---
  async function toggleTheme() {
    const isDark = document.body.classList.toggle('dark');
    try {
      await supabase
        .from('profiles')
        .update({ theme: isDark ? 'dark' : 'light' })
        .eq('telegram_id', telegramId);
    } catch (err) {
      console.error('Ошибка сохранения темы:', err);
    }
  }

  // --- СМЕНА ЯЗЫКА ---
  async function changeLanguage(lang) {
    currentLang = lang;
    try {
      await supabase
        .from('profiles')
        .update({ language: lang })
        .eq('telegram_id', telegramId);
    } catch (err) {
      console.error('Ошибка сохранения языка:', err);
    }
    updateUI();
    if (currentSection === 'tasks') renderTasks();
    else if (currentSection === 'payments') renderPayments();
    else if (currentSection === 'settings') openSettings();
  }

  // --- ОТКРЫТИЕ ФОРМЫ ---
  function openForm(section) {
    currentSection = section;
    document.getElementById('modal-title').textContent = section === 'tasks' ? t('new_task') : t('new_payment');
    document.getElementById('modal-form').classList.toggle('hidden', section !== 'tasks');
    document.getElementById('modal-form-payment').classList.toggle('hidden', section !== 'payments');
    document.getElementById('modal').style.display = 'flex';
    if (section === 'tasks') loadFolders();
  }

  // --- НАВИГАЦИЯ ---
  function navigateTo(section) {
    currentSection = section;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.nav-btn[data-section="${section}"]`)?.classList.add('active');
    
    if (section === 'tasks') renderTasks();
    else if (section === 'payments') renderPayments();
    else if (section === 'settings') openSettings();
  }

  // --- ИНИЦИАЛИЗАЦИЯ ---
  function init() {
    // 1. Инициализация Telegram
    initTelegram();

    if (!telegramId) {
      alert('Не удалось получить Telegram ID');
      return;
    }

    // 2. Загрузка профиля
    loadProfile().then(() => {
      updateUI();
      
      // 3. Навигация
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          navigateTo(this.dataset.section);
        });
      });

      // 4. Кнопка настроек
      document.getElementById('settings-btn').addEventListener('click', function() {
        navigateTo('settings');
      });

      // 5. Модальное окно - закрытие
      document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) {
          this.style.display = 'none';
        }
      });

      // 6. Форма задачи
      document.getElementById('modal-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const title = document.getElementById('item-title').value;
        const folder = document.getElementById('item-folder').value;
        const priority = document.getElementById('item-priority').value;
        const deadline = document.getElementById('item-deadline').value;
        const tags = document.getElementById('item-tags').value.split(',').map(t => t.trim()).filter(Boolean);

        try {
          const { error } = await supabase.from('tasks').insert([{
            telegram_id: telegramId,
            title,
            folder_id: folder || null,
            priority,
            tags,
            deadline: deadline || null
          }]);

          if (error) throw error;
          
          document.getElementById('modal').style.display = 'none';
          this.reset();
          renderTasks();
        } catch (err) {
          console.error('❌ Ошибка создания задачи:', err);
          alert('Ошибка создания задачи');
        }
      });

      // 7. Форма платежа
      document.getElementById('modal-form-payment').addEventListener('submit', async function(e) {
        e.preventDefault();
        const title = document.getElementById('payment-title').value;
        const dueDate = document.getElementById('payment-due-date').value;
        const recurrence = document.getElementById('payment-recurrence').value;

        try {
          const { error } = await supabase.from('payments').insert([{
            telegram_id: telegramId,
            title,
            due_date: dueDate,
            recurrence
          }]);

          if (error) throw error;
          
          document.getElementById('modal').style.display = 'none';
          this.reset();
          renderPayments();
        } catch (err) {
          console.error('❌ Ошибка создания платежа:', err);
          alert('Ошибка создания платежа');
        }
      });

      // 8. Загрузка задач по умолчанию
      renderTasks();
    });
  }

  // Запуск после загрузки DOM
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>
</body>
</html>
