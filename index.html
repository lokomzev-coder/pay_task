<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task & Payment Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Подключаем Telegram SDK -->
  <script src="https://unpkg.com/@twa-dev/sdk"></script>
  <script src="https://unpkg.com/supabase@latest/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg-primary: #f0f4f8;
      --bg-secondary: rgba(255, 255, 255, 0.7);
      --text-primary: #2a3b4d;
      --accent: #6c5ce7;
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #ff7675;
      --border-radius: 16px;
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
      --font-family: 'Nunito', sans-serif;
    }

    .dark {
      --bg-primary: #0d1224;
      --bg-secondary: rgba(30, 30, 46, 0.7);
      --text-primary: #e0e0ff;
      --glass-bg: rgba(30, 30, 46, 0.3);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--font-family);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      box-shadow: var(--glass-shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
    }

    .nav-mobile {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      padding: 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--glass-border);
      z-index: 100;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1rem;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 8px;
    }

    .nav-btn.active {
      background: var(--accent);
      color: white;
    }

    .task-item, .payment-item {
      padding: 12px;
      border-radius: 12px;
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-secondary);
    }

    .deadline-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-left: 8px;
    }

    .green { background: var(--success); }
    .yellow { background: var(--warning); }
    .red { background: var(--danger); }

    input, select, button {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      margin: 4px 0;
    }

    button {
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      width: 90%;
      max-width: 500px;
      padding: 24px;
      border-radius: var(--border-radius);
      background: var(--bg-secondary);
      box-shadow: var(--glass-shadow);
    }

    .hidden {
      display: none;
    }

    @media (min-width: 768px) {
      .nav-mobile {
        display: none;
      }
      .desktop-nav {
        display: flex;
        flex-direction: column;
        width: 200px;
        padding: 20px;
        position: fixed;
        height: 100%;
      }
      main {
        margin-left: 220px;
        padding-top: 20px;
      }
    }
  </style>
</head>
<body class="light">

<div class="container">
  <header id="app-header">
    <h1>Tracker</h1>
    <button id="settings-btn">⚙️</button>
  </header>

  <div class="desktop-nav hidden">
    <button class="nav-btn active" data-section="tasks">ЗАДАЧИ</button>
    <button class="nav-btn" data-section="payments">ПЛАТЕЖИ</button>
    <button class="nav-btn" data-section="settings">НАСТРОЙКИ</button>
  </div>

  <main id="content">
    <!-- Сюда будут подгружаться задачи или платежи -->
  </main>
</div>

<!-- Мобильная навигация -->
<div class="nav-mobile">
  <button class="nav-btn active" data-section="tasks">ЗАДАЧИ</button>
  <button class="nav-btn" data-section="payments">ПЛАТЕЖИ</button>
</div>

<!-- Модальное окно -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modal-title">Новая задача</h3>
    <form id="modal-form">
      <input type="text" id="item-title" placeholder="Название" required />
      <select id="item-folder">
        <option value="">Без папки</option>
      </select>
      <select id="item-priority">
        <option value="low">Низкий</option>
        <option value="medium">Средний</option>
        <option value="high">Высокий</option>
      </select>
      <input type="date" id="item-deadline" />
      <input type="text" id="item-tags" placeholder="Теги (через запятую)" />
      <button type="submit">Создать</button>
    </form>
    <form id="modal-form-payment" class="hidden">
      <input type="text" id="payment-title" placeholder="Название" required />
      <input type="date" id="payment-due-date" required />
      <select id="payment-recurrence">
        <option value="1m">1 месяц</option>
        <option value="2m">2 месяца</option>
        <option value="3m">3 месяца</option>
        <option value="6m">6 месяцев</option>
        <option value="1y">1 год</option>
      </select>
      <button type="submit">Создать</button>
    </form>
  </div>
</div>

<script type="module">
  // --- ЗАМЕНИТЕ НА ВАШИ ДАННЫЕ ---
  const SUPABASE_URL = 'https://lzwbdobhodwdmjzcmdjs.supabase.co'; // Замените на ваш URL
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6d2Jkb2Job2R3ZG1qemNtZGpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNTExNDksImV4cCI6MjA5OTgyNzE0OX0.tpAB7yZZH3S7MH6_EvNGWe5erJDNdZLnG0CgYDmmzRw'; 
  // --- ЛОКАЛЬНОЕ ТЕСТИРОВАНИЕ: Укажите ваш Telegram ID как BigInt ---

                  telegramId = TEST_TELEGRAM_ID;
                  console.log(`🔧 Используем тестовый Telegram ID: ${telegramId}`);

                  console.error("❌ Не указан TEST_TELEGRAM_ID для локального тестирования.");

      }
  } catch (e) {
      console.error("❌ Ошибка инициализации Telegram SDK или получения ID:", e);

      if (TEST_TELEGRAM_ID) {
          telegramId = TEST_TELEGRAM_ID;
          console.log(`🔧 Используем тестовый Telegram ID после ошибки: ${telegramId}`);
      }

  if (!telegramId) {

  const translations = {
    ru: {
      tasks: 'ЗАДАЧИ',
      payments: 'ПЛАТЕЖИ',
      settings: 'НАСТРОЙКИ',
      new_task: 'Новая задача',
      new_payment: 'Новый платёж',
      export: 'Экспорт',
      import: 'Импорт',
      theme: 'Тема',
      language: 'Язык',
      folder: 'Папка',
      priority: 'Приоритет',
      deadline: 'Дедлайн',
      due_date: 'Дата оплаты',
      recurrence: 'Периодичность',
      title: 'Название',
      add: 'Добавить',
      search: 'Поиск...',
      share: 'Поделиться',
      green: 'Зелёный',
      yellow: 'Жёлтый',
      red: 'Красный'
    },
    en: {
      tasks: 'TASKS',
      payments: 'PAYMENTS',
      settings: 'SETTINGS',
      new_task: 'New Task',
      new_payment: 'New Payment',
      export: 'Export',
      import: 'Import',
      theme: 'Theme',
      language: 'Language',
      folder: 'Folder',
      priority: 'Priority',
      deadline: 'Deadline',
      due_date: 'Due Date',
      recurrence: 'Recurrence',
      title: 'Title',
      add: 'Add',
      search: 'Search...',
      share: 'Share',
      green: 'Green',
      yellow: 'Yellow',
      red: 'Red'
    }
  };

  function t(key) {
    return translations[currentLang][key] || key;
  }

  async function loadProfile() {
    try {
      const { data, error } = await supabase.from('profiles').select('*').eq('telegram_id', telegramId).single();
      if (error) {
        if (error.code === '42P01') {
            console.error("❌ Таблица 'profiles' не найдена. Проверьте, что SQL-скрипт выполнен в Supabase.");
            alert("Ошибка базы данных: таблица profiles отсутствует.");
            return; // Важно: выходим, если профиль не создан
        } else if (error.code === 'PGRST301') {
            console.error("❌ RLS политика не позволяет выполнить запрос. Проверьте настройки Supabase.");
            alert("Ошибка доступа к данным (RLS).");
            return;
        } else {
            console.error("❌ Ошибка при загрузке профиля:", error.message || error);
        }
        // Создаём профиль, если его нет
        const { error: insertError } = await supabase.from('profiles').insert([{ telegram_id: telegramId }]);
        if (insertError) {
            console.error("❌ Ошибка при создании профиля:", insertError.message || insertError);
            alert("Не удалось создать профиль. Проверьте консоль.");
            return;
        } else {
            console.log("🆕 Профиль создан для ID:", telegramId.toString());
            currentLang = 'ru';
            document.body.classList.remove('dark');
        }
      } else {
        currentLang = data.language;
        document.body.classList.toggle('dark', data.theme === 'dark');
        console.log("👤 Профиль загружен. Язык:", currentLang, "Тема:", data.theme);
      }
      updateUI(); // Обновляем интерфейс после загрузки языка
    } catch (err) {
      console.error("❌ Необработанная ошибка при загрузке профиля:", err);
      alert("Произошла ошибка при загрузке профиля.");
    }
  }

  async function toggleTheme() {
    const newTheme = document.body.classList.toggle('dark') ? 'dark' : 'light';
    const { error } = await supabase.from('profiles').update({ theme: newTheme }).eq('telegram_id', telegramId);
    if (error) {
        console.error("❌ Ошибка при обновлении темы:", error.message || error);
        alert("Не удалось обновить тему. Проверьте консоль.");
    } else {
        console.log("🎨 Тема обновлена на:", newTheme);
    }
  }

  async function changeLanguage(lang) {
    currentLang = lang;
    const { error } = await supabase.from('profiles').update({ language: lang }).eq('telegram_id', telegramId);
    if (error) {
        console.error("❌ Ошибка при обновлении языка:", error.message || error);
        alert("Не удалось обновить язык. Проверьте консоль.");
    } else {
        console.log("🌐 Язык обновлён на:", lang);
        updateUI();
    }
  }

  function updateUI() {
    // Обновляем текст на кнопках навигации
    document.querySelectorAll('.nav-btn').forEach(btn => {
        const section = btn.dataset.section;
        if (section === 'tasks') btn.textContent = t('tasks');
        if (section === 'payments') btn.textContent = t('payments');
        if (section === 'settings') btn.textContent = t('settings');
    });
    // Обновляем заголовок модального окна, если оно открыто
    if (currentSection === 'tasks') {
        document.getElementById('modal-title').textContent = t('new_task');
    } else if (currentSection === 'payments') {
        document.getElementById('modal-title').textContent = t('new_payment');
    }
    // Обновляем placeholder и label в формах
    document.getElementById('item-title').placeholder = t('title');
    document.getElementById('item-folder').previousElementSibling.textContent = t('folder');
    document.getElementById('item-priority').previousElementSibling.textContent = t('priority');
    document.getElementById('item-deadline').previousElementSibling.textContent = t('deadline');
    document.getElementById('item-tags').placeholder = t('tags');
    document.getElementById('modal-form').lastElementChild.textContent = t('add');

    document.getElementById('payment-title').placeholder = t('title');
    document.getElementById('payment-due-date').previousElementSibling.textContent = t('due_date');
    document.getElementById('payment-recurrence').previousElementSibling.textContent = t('recurrence');
    document.getElementById('modal-form-payment').lastElementChild.textContent = t('add');
  }

  async function loadFolders() {
    try {
      const { data, error } = await supabase.from('folders').select('id, name').eq('telegram_id', telegramId);
      if (error) throw error;
      const folderSelect = document.getElementById('item-folder');
      folderSelect.innerHTML = `<option value="">${t('folder')}</option>`;
      data.forEach(folder => {
        const option = document.createElement('option');
        option.value = folder.id;
        option.textContent = folder.name;
        folderSelect.appendChild(option);
      });
    } catch (err) {
      console.error("❌ Ошибка при загрузке папок:", err.message || err);
      alert("Ошибка при загрузке папок. Проверьте консоль.");
    }
  }

  async function renderTasks() {
    try {
      const { data: tasks, error } = await supabase.from('tasks').select('*').eq('telegram_id', telegramId);
      if (error) throw error;

      const content = document.getElementById('content');
      content.innerHTML = ''; // Очищаем содержимое перед рендером

      // Создаём карточку с поиском и кнопкой добавления
      const headerCard = document.createElement('div');
      headerCard.className = 'glass-card';
      headerCard.innerHTML = `
        <input type="text" id="search-tasks" placeholder="${t('search')}" />
        <button id="add-task-btn-main">${t('add')}</button>
      `;
      content.appendChild(headerCard);

      // Добавляем обработчик для новой кнопки "Добавить задачу"
      document.getElementById('add-task-btn-main').onclick = () => openForm('tasks');

      // Добавляем обработчик для поиска
      const searchInput = document.getElementById('search-tasks');
      searchInput.oninput = () => {
        const filter = searchInput.value.toLowerCase();
        document.querySelectorAll('.task-item').forEach(el => {
          el.style.display = el.textContent.toLowerCase().includes(filter) ? '' : 'none';
        });
      };

      // Рендерим задачи
      tasks.forEach(task => {
        const dueDate = task.deadline ? new Date(task.deadline) : null;
        let statusClass = 'green'; // По умолчанию зелёный, если дедлайна нет
        if (dueDate) {
          const diff = (dueDate - new Date()) / (1000 * 60 * 60 * 24);
          if (diff < 1) statusClass = 'red';
          else if (diff < 3) statusClass = 'yellow';
        }
        const taskDiv = document.createElement('div');
        taskDiv.className = 'task-item glass-card';
        taskDiv.innerHTML = `
          <span>${task.title}</span>
          <div>
            <span class="deadline-indicator ${statusClass}"></span>
            <button onclick="window.shareItem('task', '${task.id}')">${t('share')}</button>
          </div>
        `;
        content.appendChild(taskDiv);
      });
    } catch (err) {
      console.error("❌ Ошибка при загрузке задач:", err.message || err);
      alert("Ошибка при загрузке задач. Проверьте консоль.");
    }
  }

  async function renderPayments() {
    try {
      const { data: payments, error } = await supabase.from('payments').select('*').eq('telegram_id', telegramId);
      if (error) throw error;

      const content = document.getElementById('content');
      content.innerHTML = ''; // Очищаем содержимое перед рендером

      // Создаём карточку с поиском и кнопкой добавления
      const headerCard = document.createElement('div');
      headerCard.className = 'glass-card';
      headerCard.innerHTML = `
        <input type="text" id="search-payments" placeholder="${t('search')}" />
        <button id="add-payment-btn-main">${t('add')}</button>
      `;
      content.appendChild(headerCard);

      // Добавляем обработчик для новой кнопки "Добавить платёж"
      document.getElementById('add-payment-btn-main').onclick = () => openForm('payments');

      // Добавляем обработчик для поиска
      const searchInput = document.getElementById('search-payments');
      searchInput.oninput = () => {
        const filter = searchInput.value.toLowerCase();
        document.querySelectorAll('.payment-item').forEach(el => {
          el.style.display = el.textContent.toLowerCase().includes(filter) ? '' : 'none';
        });
      };

      // Рендерим платежи
      payments.forEach(payment => {
        const dueDate = payment.due_date ? new Date(payment.due_date) : null;
        let statusClass = 'green'; // По умолчанию зелёный, если даты нет
        if (dueDate) {
          const diff = (dueDate - new Date()) / (1000 * 60 * 60 * 24);
          if (diff < 2) statusClass = 'red';
          else if (diff < 7) statusClass = 'yellow';
        }
        const paymentDiv = document.createElement('div');
        paymentDiv.className = 'payment-item glass-card';
        paymentDiv.innerHTML = `
          <span>${payment.title}</span>
          <div>
            <span class="deadline-indicator ${statusClass}"></span>
            <button onclick="window.shareItem('payment', '${payment.id}')">${t('share')}</button>
          </div>
        `;
        content.appendChild(paymentDiv);
      });
    } catch (err) {
      console.error("❌ Ошибка при загрузке платежей:", err.message || err);
      alert("Ошибка при загрузке платежей. Проверьте консоль.");
    }
  }

  async function shareItem(type, id) {
    try {
      // В реальной реализации вы бы генерировали уникальную ссылку и записывали её в таблицу shares
      // Пока просто копируем ссылку на сам сайт
      const link = `${window.location.origin}?shared_resource=${type}&id=${id}`;
      await navigator.clipboard.writeText(link);
      alert(t('share') + '!'); // Или показать сообщение об успешном копировании
    } catch (err) {
      console.error('❌ Failed to copy share link: ', err);
      alert('Не удалось скопировать ссылку');
    }
  }

  async function exportData() {
    try {
      const [tasksRes, paymentsRes] = await Promise.all([
        supabase.from('tasks').select('*').eq('telegram_id', telegramId),
        supabase.from('payments').select('*').eq('telegram_id', telegramId)
      ]);

      if (tasksRes.error) throw tasksRes.error;
      if (paymentsRes.error) throw paymentsRes.error;

      const wb = XLSX.utils.book_new();
      if (tasksRes.data.length > 0) {
        const wsTasks = XLSX.utils.json_to_sheet(tasksRes.data.map(t => ({...t, telegram_id: undefined}))); // Исключить telegram_id из экспорта
        XLSX.utils.book_append_sheet(wb, wsTasks, "Tasks");
      }
      if (paymentsRes.data.length > 0) {
        const wsPayments = XLSX.utils.json_to_sheet(paymentsRes.data.map(p => ({...p, telegram_id: undefined}))); // Исключить telegram_id из экспорта
        XLSX.utils.book_append_sheet(wb, wsPayments, "Payments");
      }

      XLSX.writeFile(wb, `tracker_data_${Date.now()}.xlsx`);
      console.log("📥 Данные успешно экспортированы.");
    } catch (err) {
      console.error("❌ Ошибка при экспорте:", err.message || err);
      alert("Ошибка при экспорте данных. Проверьте консоль.");
    }
  }

  function importData() {
    alert(t('import') + '. ' + 'Пожалуйста, используйте экспорт.');
  }

  function openSettings() {
    const content = document.getElementById('content');
    content.innerHTML = `
      <div class="glass-card">
        <h3>${t('settings')}</h3>
        <p><label>${t('theme')}:</label> <button onclick="window.toggleTheme()">Toggle</button></p>
        <p><label>${t('language')}:</label>
          <select onchange="window.changeLanguage(this.value)">
            <option value="ru" ${currentLang === 'ru' ? 'selected' : ''}>RU</option>
            <option value="en" ${currentLang === 'en' ? 'selected' : ''}>EN</option>
          </select>
        </p>
        <p><button onclick="window.exportData()">${t('export')}</button></p>
        <p><button onclick="window.importData()">${t('import')}</button></p>
      </div>
    `;
  }

  function openForm(section) {
    currentSection = section;
    document.getElementById('modal-title').textContent = section === 'tasks' ? t('new_task') : t('new_payment');
    document.getElementById('modal-form').classList.toggle('hidden', section !== 'tasks');
    document.getElementById('modal-form-payment').classList.toggle('hidden', section !== 'payments');
    document.getElementById('modal').style.display = 'flex';
    if (section === 'tasks') loadFolders();
  }

  // --- Обработчики навигации ---
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentSection = e.target.dataset.section;
      console.log("📱 Переключение на секцию:", currentSection);
      if (currentSection === 'tasks') renderTasks();
      else if (currentSection === 'payments') renderPayments();
      else if (currentSection === 'settings') openSettings();
    });
  });

  // --- Обработчики модального окна ---
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') document.getElementById('modal').style.display = 'none';
  });

  document.getElementById('modal-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('item-title').value;
    const folder = document.getElementById('item-folder').value;
    const priority = document.getElementById('item-priority').value;
    const deadline = document.getElementById('item-deadline').value;
    const tags = document.getElementById('item-tags').value.split(',').map(tag => tag.trim()).filter(Boolean);

    const { error } = await supabase.from('tasks').insert([{
      telegram_id: telegramId,
      title,
      folder_id: folder || null,
      priority,
      tags,
      deadline: deadline || null
    }]);
    if (error) {
        console.error("❌ Ошибка при создании задачи:", error.message || error);
        alert("Ошибка при создании задачи. Проверьте консоль.");
    } else {
        console.log("✅ Задача создана:", title);
        renderTasks(); // Перезагружаем задачи
    }
    document.getElementById('modal').style.display = 'none';
    document.getElementById('modal-form').reset();
  });

  document.getElementById('modal-form-payment').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('payment-title').value;
    const dueDate = document.getElementById('payment-due-date').value;
    const recurrence = document.getElementById('payment-recurrence').value;

    const { error } = await supabase.from('payments').insert([{
      telegram_id: telegramId,
      title,
      due_date: dueDate,
      recurrence
    }]);
    if (error) {
        console.error("❌ Ошибка при создании платежа:", error.message || error);
        alert("Ошибка при создании платежа. Проверьте консоль.");
    } else {
        console.log("✅ Платёж создан:", title);
        renderPayments(); // Перезагружаем платежи
    }
    document.getElementById('modal').style.display = 'none';
    document.getElementById('modal-form-payment').reset();
  });

  document.getElementById('settings-btn').addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.nav-btn[data-section="settings"]').classList.add('active');
    currentSection = 'settings';
    console.log("⚙️ Открытие настроек");
    openSettings();
  });

  // --- Инициализация ---
  loadProfile().then(() => {
    console.log("🚀 Инициализация завершена. Загрузка задач...");
    renderTasks(); // Загрузка задач по умолчанию
    if (window.innerWidth >= 768) {
      document.querySelector('.desktop-nav').classList.remove('hidden');
      document.querySelector('.nav-mobile').classList.add('hidden');
    }
  }).catch(err => {
      console.error("❌ Ошибка при инициализации:", err);
  });

  // --- Глобальные функции для onClick ---
  window.shareItem = shareItem;
  window.toggleTheme = toggleTheme;
  window.changeLanguage = changeLanguage;
  window.exportData = exportData;
  window.importData = importData;

</script>
</body>
</html>
